<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Depths — Roguelike PoC</title>
<style>
  html,body{margin:0;padding:0;height:100%;background:#05070a;overflow:hidden}
  body{font-family:Menlo,Consolas,monospace}
  canvas{display:block;cursor:default;touch-action:none}
  #navBtns{position:fixed;top:10px;right:10px;display:flex;gap:8px;z-index:20}
  #navBtns a,#navBtns button{
    display:flex;align-items:center;justify-content:center;
    width:36px;height:36px;box-sizing:border-box;
    background:#161d2bee;border:1px solid #3a4664;border-radius:6px;
    color:#c9d4e0;font:bold 16px Menlo,Consolas,monospace;text-decoration:none;
    cursor:pointer;transition:filter .12s,transform .12s;padding:0}
  #navBtns a:hover,#navBtns button:hover{filter:brightness(1.45);transform:translateY(-1px)}
  #navBtns a:focus-visible,#navBtns button:focus-visible,#menuPanel button:focus-visible,#menuPanel a:focus-visible{outline:3px solid #ffd75f;outline-offset:3px}
  #menuOverlay{position:fixed;inset:0;background:rgba(5,7,10,0.72);z-index:30;
    display:flex;align-items:center;justify-content:center}
  #menuOverlay[hidden]{display:none}
  #menuPanel{background:#0a0e16;border:2px solid #3a4664;padding:26px 30px;
    min-width:240px;text-align:center}
  #menuPanel h2{margin:0 0 18px;color:#e8d9a0;font:bold 20px Menlo,Consolas,monospace}
  #menuPanel button,#menuPanel a{
    display:block;width:100%;box-sizing:border-box;margin:9px 0;padding:10px 14px;
    background:#161d2b;border:1px solid #3a4664;border-radius:4px;
    color:#c9d4e0;font:bold 13px Menlo,Consolas,monospace;text-decoration:none;
    cursor:pointer;transition:filter .12s,transform .12s}
  #menuPanel button:hover,#menuPanel a:hover{filter:brightness(1.45);transform:translateY(-1px)}
  #menuPanel #mNewRun.confirm{border-color:#ff5c5c;color:#ff8a8a}
  #tutorial{position:fixed;left:12px;bottom:12px;z-index:28;width:min(390px,calc(100vw - 24px));box-sizing:border-box;
    padding:14px 16px;background:#0a0e16ee;border:2px solid #b28a3d;color:#c9d4e0;font:13px/1.55 Menlo,Consolas,monospace;box-shadow:0 10px 34px #000b}
  #tutorial[hidden]{display:none}#tutorial b{color:#ffd75f}#tutorial button{float:right;margin-left:12px;padding:8px 12px;background:#b28a3d;color:#090b10;border:0;font:bold 12px Menlo,Consolas,monospace;cursor:pointer}
  .sr-only{position:absolute!important;width:1px!important;height:1px!important;padding:0!important;margin:-1px!important;overflow:hidden!important;clip:rect(0,0,0,0)!important;white-space:nowrap!important;border:0!important}
  @media (pointer:coarse){#navBtns a,#navBtns button{width:44px;height:44px}#navBtns{gap:6px}}
  @media (prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.001ms!important;animation-iteration-count:1!important;transition-duration:.001ms!important}}
</style>

   Depths — a click-to-move turn-based roguelite RPG

   Pick a class, level up, bank souls, claim the Amulet on 10.
   ========================================================= */

// ---------- Constants ----------
var COLS = 40, ROWS = 30;
var HUD_H = 128;

// ---------- Utilities ----------
function irand(a,b){ return a + Math.floor(Math.random()*(b-a+1)); }
function choice(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
function idx(x,y){ return y*COLS + x; }
function inB(x,y){ return x>=0 && y>=0 && x<COLS && y<ROWS; }
function manhattan(ax,ay,bx,by){ return Math.abs(ax-bx)+Math.abs(ay-by); }
function cheby(ax,ay,bx,by){ return Math.max(Math.abs(ax-bx),Math.abs(ay-by)); }
function hit(r,mx,my){ return r && mx>=r.x && mx<=r.x+r.w && my>=r.y && my<=r.y+r.h; }
function sign(v){ return v>0?1:(v<0?-1:0); }

function lsGet(key){ try { return parseInt(localStorage.getItem(key)||'0',10)||0; } catch(e){ return 0; } }
function lsSet(key,v){ try { localStorage.setItem(key, String(v)); } catch(e){} }
function loadBest(){ return lsGet('depths_best'); }
function saveBest(d){ if (d > loadBest()) lsSet('depths_best', d); }
function loadWins(){ return lsGet('depths_wins'); }
function loadSouls(){ return lsGet('depths_souls'); }
function saveSouls(v){ lsSet('depths_souls', Math.max(0,v)); }
function loadPerks(){
  try { return JSON.parse(localStorage.getItem('depths_perks')||'{}') || {}; }
  catch(e){ return {}; }
}
function savePerks(p){ try { localStorage.setItem('depths_perks', JSON.stringify(p)); } catch(e){} }
function hasPerk(k){ return !!loadPerks()[k]; }

function lineCells(x0,y0,x1,y1){
  var cells = [];
  var dx = Math.abs(x1-x0), dy = Math.abs(y1-y0);
  var sx = x0<x1?1:-1, sy = y0<y1?1:-1;
  var err = dx-dy, x = x0, y = y0;
  for(;;){
    cells.push([x,y]);
    if (x===x1 && y===y1) break;
    var e2 = 2*err;
    if (e2 > -dy){ err -= dy; x += sx; }
    if (e2 <  dx){ err += dx; y += sy; }
  }
  return cells;
}

// ---------- Layout / resize ----------
var W = 0, H = 0, tile = 16, offX = 0, offY = 0, DPR = 1;
function resize(){
  DPR = window.devicePixelRatio || 1;
  W = window.innerWidth; H = window.innerHeight;
  HUD_H = W < 700 ? 190 : 128;
  canvas.width  = Math.floor(W*DPR);
  canvas.height = Math.floor(H*DPR);
  canvas.style.width  = W+'px';
  canvas.style.height = H+'px';
  ctx.setTransform(DPR,0,0,DPR,0,0);
  var mapH = Math.max(60, H - HUD_H);
  tile = Math.max(18, Math.floor(Math.min(W/COLS, mapH/ROWS)));
  offX = Math.floor((W - COLS*tile)/2);
  offY = Math.floor((mapH - ROWS*tile)/2);
}
window.addEventListener('resize', resize);
resize();
function layoutFresh(){
  if (W !== window.innerWidth || H !== window.innerHeight ||
      DPR !== (window.devicePixelRatio||1)) resize();
}

var KIND_INFO = {

  flask:       { glyph:'!', color:'#9be05a', name:'Acid Flask',           verb:'Throw' },

// ---------- Tiny WebAudio synth (muteable, safe when unavailable) ----------
var audioCtx = null;
var muted = lsGet('depths_mute') === 1;
function ac(){
  if (audioCtx) return audioCtx;
  try {
    var AC = window.AudioContext || window.webkitAudioContext;
    if (AC) audioCtx = new AC();
  } catch(e){ audioCtx = null; }
  return audioCtx;
}
function tone(freq, dur, type, vol, delay, slideTo){
  var c = ac(); if (!c) return;
  try {
    var t0 = c.currentTime + (delay||0);
    var o = c.createOscillator(), g = c.createGain();
    o.type = type || 'square';
    o.frequency.setValueAtTime(freq, t0);
    if (slideTo) o.frequency.exponentialRampToValueAtTime(Math.max(20,slideTo), t0+dur);
    g.gain.setValueAtTime(vol||0.08, t0);
    g.gain.exponentialRampToValueAtTime(0.0001, t0+dur);
    o.connect(g); g.connect(c.destination);
    o.start(t0); o.stop(t0+dur+0.02);
  } catch(e){}
}
function sfx(name){
  if (muted) return;
  switch(name){
    case 'hit':     tone(200, 0.06, 'square', 0.06); break;
    case 'kill':    tone(180, 0.14, 'square', 0.07, 0, 70); break;
    case 'hurt':    tone(110, 0.13, 'sawtooth', 0.08, 0, 70); break;
    case 'shoot':   tone(900, 0.04, 'square', 0.045, 0, 500); break;
    case 'pickup':  tone(640, 0.05, 'sine', 0.07); tone(880, 0.06, 'sine', 0.07, 0.05); break;
    case 'gold':    tone(988, 0.05, 'sine', 0.06); tone(1319, 0.07, 'sine', 0.06, 0.05); break;
    case 'potion':  tone(300, 0.09, 'sine', 0.08, 0, 520); break;
    case 'level':   tone(523, 0.08, 'square', 0.06); tone(659, 0.08, 'square', 0.06, 0.08); tone(784, 0.12, 'square', 0.06, 0.16); break;
    case 'descend': tone(220, 0.3, 'sawtooth', 0.07, 0, 70); break;
    case 'boom':    tone(90, 0.22, 'sawtooth', 0.1, 0, 40); break;
    case 'death':   tone(150, 0.6, 'sawtooth', 0.09, 0, 35); break;
    case 'win':     tone(523, 0.1, 'square', 0.06); tone(659, 0.1, 'square', 0.06, 0.1);
                    tone(784, 0.1, 'square', 0.06, 0.2); tone(1046, 0.25, 'square', 0.07, 0.3); break;
  }
}

// ---------- Inventory / stats helpers ----------
var INV_ORDER = CONSUME_KINDS;
function invCount(kind){ return S.inv[kind]||0; }
function invAdd(kind,n){ S.inv[kind] = (S.inv[kind]||0) + n; }
function invRemove(kind,n){ S.inv[kind] = Math.max(0,(S.inv[kind]||0) - n); }
function invKinds(){ return INV_ORDER.filter(function(k){ return invCount(k)>0; }); }
function ringCountEquipped(kind){ return (S.rings[0]===kind?1:0)+(S.rings[1]===kind?1:0); }
function sk(key){ return !!(S && S.skills && S.skills[key]); }
function equipBonus(k){
  var s = 0;
  for (var i=0; i<GEAR_SLOTS.length; i++){
    var g = S.equip[GEAR_SLOTS[i]];
    if (!g) continue;
    for (var a=0; a<g.affixes.length; a++)
      if (g.affixes[a].k === k) s += g.affixes[a].v;
    if (g.cursed && g.curse.k === k) s += g.curse.v;
  }
  return s;
}
// class-weapon proficiency: melee scales with melee weapons, bows shoot, catalysts brew
function weaponMeleeContrib(){
  var g = S.equip.weapon;
  if (!g) return 0;
  if (g.wtype === 'melee')
    return CLASSES[S.cls].prof === 'melee' ? g.power : Math.ceil(g.power*0.6);
  return Math.floor(g.power*0.3);   // swinging a bow or alembic is desperate work
}
function bowPower(){
  var g = S.equip.weapon;
  return (g && g.wtype === 'bow') ? g.power : 0;
}
function hasBow(){ var g = S.equip.weapon; return !!(g && g.wtype === 'bow'); }
function catalystPower(){
  if (!S) return 0;
  var g = S.equip.weapon;
  var p = (g && g.wtype === 'catalyst') ? g.power : 0;
  return sk('a_cat') ? p*2 : p;
}
function pAtk(){
  var a = CLASSES[S.cls].atkBase + weaponMeleeContrib() + equipBonus('atk')
        + 2*ringCountEquipped('ring_str')
        + (sk('w_might1')?2:0) + (sk('w_might2')?2:0);
  if (sk('w_berserk') && S.hp < S.maxHp*0.4) a += 4;
  return a;
}
function rangedAtk(){
  return Math.max(1, bowPower() + equipBonus('atk') + 2*ringCountEquipped('ring_str')
       + (sk('r_aim1')?1:0) - 1);
}
function bowRangeCur(){ return CLASSES.ranger.bowRange + (sk('r_range')?1:0); }
function pDef(){
  var d = 0;
  if (S.equip.armor) d += S.equip.armor.power;
  if (S.equip.helm)  d += S.equip.helm.power;
  if (S.equip.boots) d += S.equip.boots.power;
  return d + equipBonus('def') + 2*ringCountEquipped('ring_prot')
       + (sk('w_plate')?1:0) + (sk('w_jugg')?2:0) + (sk('a_tough')?1:0);
}
function poisonImmune(){ return sk('w_jugg') || sk('r_venom'); }
function regenPower(){ return ringCountEquipped('ring_regen') + equipBonus('regen') + (sk('r_regen')?1:0); }
function refreshDerived(){
  var nm = Math.max(5, S.baseMaxHp + equipBonus('hp'));
  S.maxHp = nm;
  if (S.hp > nm) S.hp = nm;
}
function xpNeeded(level){ return 14 + (level-1)*9; }
function goldGain(n){ return Math.round(n); }
function abilityCdMax(){
  var cd = ABILITIES[S.cls].cd;
  if (sk('w_swift')) cd -= 2;
  if (sk('a_trans')) cd -= 3;
  return Math.max(3, cd);
}
// skill helpers
function skillDef(key){
  var list = SKILLS[S.cls];
  for (var i=0; i<list.length; i++) if (list[i].key===key) return list[i];
  return null;
}
function skillPrereqOk(node){
  if (node.tier === 0) return true;
  var list = SKILLS[S.cls];
  for (var i=0; i<list.length; i++)
    if (list[i].br===node.br && list[i].tier===node.tier-1) return !!S.skills[list[i].key];
  return true;
}
function takeSkill(key){
  var node = skillDef(key);
  if (!node || S.skills[key]) return false;
  if (S.skillPts <= 0){ log('No skill points. Level up to earn more.', '#7d8ea3'); return false; }
  if (!skillPrereqOk(node)){ log('That skill needs its branch unlocked first.', '#7d8ea3'); return false; }
  S.skills[key] = true;
  S.skillPts--;
  if (key==='w_tough'){ S.baseMaxHp += 10; refreshDerived(); S.hp = Math.min(S.maxHp, S.hp+10); }
  if (key==='r_tough' || key==='a_tough'){ S.baseMaxHp += 8; refreshDerived(); S.hp = Math.min(S.maxHp, S.hp+8); }
  if (key==='r_eyes'){ S.fovR = Math.min(12, S.fovR+1); computeFOV(); }
  log('↑ Learned: '+node.name+' — '+node.desc, '#ffd75f');
  sfx('level');
  return true;
}
function respecSkills(){
  var refunded = 0;
  for (var k in S.skills){
    if (!S.skills[k]) continue;
    refunded++;
    if (k==='w_tough'){ S.baseMaxHp -= 10; }
    if (k==='r_tough' || k==='a_tough'){ S.baseMaxHp -= 8; }
    if (k==='r_eyes'){ S.fovR = Math.max(8, S.fovR-1); }
  }
  S.skills = {};
  S.skillPts += refunded;
  refreshDerived();
  if (S.hp > S.maxHp) S.hp = S.maxHp;
  computeFOV();
  log('Your mind clears — '+refunded+' skill points refunded.', '#c9a0ff');
}

// ---------- Gear generation ----------
function gearBaseName(slot,power,wtype){
  var t = function(arr){ return arr[Math.max(0,Math.min(power-1,arr.length-1))]; };
  if (slot==='weapon'){
    if (wtype==='bow') return t(BOW_NAMES);
    if (wtype==='catalyst') return t(CATALYST_NAMES);
    return t(WEAPON_NAMES);
  }
  if (slot==='armor')  return t(ARMOR_NAMES);
  if (slot==='helm')   return t(HELM_NAMES);
  return t(BOOT_NAMES);
}
function rollWtype(){
  // weighted toward the current class's proficiency so drops feel usable
  var prof = S ? CLASSES[S.cls].prof : null;
  if (prof && Math.random() < 0.55) return prof;
  return choice(['melee','bow','catalyst']);
}
function rollAffix(){
  var r = Math.random();
  if (r < 0.35) return { k:'atk', v:irand(1,2) };
  if (r < 0.6)  return { k:'def', v:1 };
  if (r < 0.85) return { k:'hp',  v:choice([6,10]) };
  return { k:'regen', v:1 };
}
function affixText(a){
  if (a.k==='atk') return (a.v>0?'+':'')+a.v+' atk';
  if (a.k==='def') return (a.v>0?'+':'')+a.v+' def';
  if (a.k==='hp')  return (a.v>0?'+':'')+a.v+' HP';
  return (a.v>0?'+':'')+a.v+' regen';
}
function makeGear(depth, slot, forceRarity, noCurse, forceWtype){
  slot = slot || choice(GEAR_SLOTS);
  var power;
  if (slot==='weapon' || slot==='armor') power = Math.max(1, depth + irand(0,1));
  else power = Math.max(1, Math.ceil(depth/2));
  var wtype = slot==='weapon' ? (forceWtype || rollWtype()) : null;
  var r = Math.random();
  var rarity = forceRarity || (r<0.6 ? 'common' : (r<0.9 ? 'magic' : 'rare'));
  var affixes = [];
  if (rarity==='magic') affixes.push(rollAffix());
  if (rarity==='rare'){ affixes.push(rollAffix()); affixes.push(rollAffix()); }
  var cursed = !noCurse && rarity!=='common' && Math.random()<0.15;
  var curse = cursed ? choice([{k:'atk',v:-2},{k:'def',v:-1},{k:'hp',v:-8}]) : null;
  var name = gearBaseName(slot,power,wtype);
  if (rarity==='magic') name = choice(MAGIC_PRE)+' '+name;
  if (rarity==='rare')  name = choice(RARE_PRE)+' '+name;
  return { slot:slot, power:power, wtype:wtype, rarity:rarity, affixes:affixes,
           cursed:cursed, curse:curse, known:false, name:name };
}
function gearColor(g){
  if (g.cursed && g.known) return '#ff5c5c';
  return RARITY_COLOR[g.rarity];
}
function gearStatText(g){
  var parts = [];
  if (g.slot==='weapon') parts.push('['+WTYPE_LABEL[g.wtype||'melee']+'] +'+g.power);
  else parts.push('+'+g.power+' def');
  for (var i=0; i<g.affixes.length; i++) parts.push(affixText(g.affixes[i]));
  if (g.cursed && g.known) parts.push('CURSED: '+affixText(g.curse));
  return parts.join(', ');
}
function gearGlyph(slot, wtype){
  if (slot==='weapon') return wtype==='bow' ? ')' : (wtype==='catalyst' ? '¡' : '/');
  return slot==='armor' ? ']' : (slot==='helm' ? '[' : ',');
}
function gearValue(g){
  var v = 8 + g.power*7;
  for (var i=0; i<g.affixes.length; i++) v += 10;
  if (g.rarity==='magic') v = Math.round(v*1.6);
  if (g.rarity==='rare')  v = Math.round(v*2.4);
  return v;
}
var KIND_VALUE = { potion:16, flask:16, scroll_fire:24, scroll_tele:20, scroll_map:20,
                   ring_regen:45, ring_str:45, ring_prot:45 };
function sellPrice(v){ return Math.max(1, Math.round(v*0.4)); }
// effective stats a piece of gear would give THIS class (for hover comparison)
function gearEffStats(g){
  var st = { atk:0, def:0, hp:0, regen:0 };
  if (g){
    if (g.slot==='weapon'){
      if (g.wtype==='melee') st.atk += CLASSES[S.cls].prof==='melee' ? g.power : Math.ceil(g.power*0.6);
      else if (g.wtype==='bow') st.atk += (S.cls==='ranger') ? g.power : Math.floor(g.power*0.3);
      else st.atk += (S.cls==='alchemist') ? g.power : Math.floor(g.power*0.3);
    } else st.def += g.power;
    for (var i=0; i<g.affixes.length; i++){
      var a = g.affixes[i];
      if (st[a.k] !== undefined) st[a.k] += a.v;
    }
    if (g.cursed && g.known && g.curse && st[g.curse.k] !== undefined) st[g.curse.k] += g.curse.v;
  }
  return st;
}

// ---------- Map generation ----------
function genFloor(depth){
  S.depth = depth;
  S.theme = themeFor(depth);
  S.modifier = (depth>=2 && depth<MAX_DEPTH && Math.random()<0.4) ? choice(MODIFIERS) : null;
  var map = new Uint8Array(COLS*ROWS);
  var seen = new Uint8Array(COLS*ROWS);
  var vis  = new Uint8Array(COLS*ROWS);
  var rooms = [];
  var isFinal = (depth === MAX_DEPTH);
  var isArena = (depth === 7);
  var rich = S.modifier && S.modifier.key==='rich';

  function carveRoom(r){
    for (var y=r.y; y<r.y+r.h; y++)
      for (var x=r.x; x<r.x+r.w; x++)
        map[idx(x,y)] = 1;
  }
  function carveH(x0,x1,y){ for (var x=Math.min(x0,x1); x<=Math.max(x0,x1); x++) map[idx(x,y)]=1; }
  function carveV(y0,y1,x){ for (var y=Math.min(y0,y1); y<=Math.max(y0,y1); y++) map[idx(x,y)]=1; }
  function mkRoom(x,y,w,h){ return {x:x,y:y,w:w,h:h,cx:Math.floor(x+w/2),cy:Math.floor(y+h/2)}; }

  if (isArena){
    rooms.push(mkRoom(2,12,5,6));
    rooms.push(mkRoom(9,5,24,19));
    rooms.push(mkRoom(35,12,4,6));
    rooms.forEach(carveRoom);
    carveH(rooms[0].cx, rooms[1].x+1, rooms[0].cy);
    carveH(rooms[1].x+rooms[1].w-2, rooms[2].cx, rooms[2].cy);
  } else {
    // generator flavor per theme: crypt = warren of small cells, fungal = few big caverns
    var gen = S.theme.gen;
    var maxRooms = gen==='crypt' ? 14 + Math.min(3,depth) : (gen==='fungal' ? 8 : 10 + Math.min(4, depth));
    var wLo = gen==='crypt' ? 3 : (gen==='fungal' ? 6 : 4);
    var wHi = gen==='crypt' ? 6 : (gen==='fungal' ? 11 : 9);
    var hLo = 3, hHi = gen==='crypt' ? 5 : (gen==='fungal' ? 8 : 7);
    for (var attempt=0; attempt<260 && rooms.length<maxRooms; attempt++){
      var w = irand(wLo,wHi), h = irand(hLo,hHi);
      var x = irand(1, COLS-w-2), y = irand(1, ROWS-h-2);
      var overlaps = false;
      for (var i=0; i<rooms.length; i++){
        var o = rooms[i];
        if (x < o.x+o.w+1 && x+w+1 > o.x && y < o.y+o.h+1 && y+h+1 > o.y){ overlaps = true; break; }
      }
      if (overlaps) continue;
      var room = mkRoom(x,y,w,h);
      carveRoom(room);
      if (rooms.length > 0){
        var prev = rooms[rooms.length-1];
        if (Math.random() < 0.5){ carveH(prev.cx, room.cx, prev.cy); carveV(prev.cy, room.cy, room.cx); }
        else                    { carveV(prev.cy, room.cy, prev.cx); carveH(prev.cx, room.cx, room.cy); }
      }
      rooms.push(room);
    }
  }

  S.map = map; S.seen = seen; S.vis = vis; S.rooms = rooms;
  S.px = rooms[0].cx; S.py = rooms[0].cy;

  var far = rooms[rooms.length>1?1:0], farD = -1;
  for (var r=1; r<rooms.length; r++){
    var d = manhattan(rooms[r].cx, rooms[r].cy, S.px, S.py);
    if (d > farD){ farD = d; far = rooms[r]; }
  }
  S.stairs = isFinal ? null : { x:far.cx, y:far.cy };
  S.bossRoom = isFinal ? far : null;

  S.keeper = null; S.shopWares = null; S.shopGreeted = false; S.pendingShop = false;
  var shopRoom = null;
  if (depth % 3 === 0 && !isFinal && rooms.length > 2){
    for (i=1; i<rooms.length; i++){
      if (rooms[i] !== far){ shopRoom = rooms[i]; break; }
    }
    if (shopRoom){
      S.keeper = { x:shopRoom.cx, y:shopRoom.cy };
      S.shopWares = makeShopWares(depth);
    }
  }

  var vaultRoom = null;
  if (!isFinal && !isArena && depth>=3 && Math.random()<0.25 && rooms.length>3){
    for (i=2; i<rooms.length; i++){
      if (rooms[i]!==far && rooms[i]!==shopRoom && rooms[i]!==rooms[0]){ vaultRoom = rooms[i]; break; }
    }
  }

  function inRoom(rm,x,y){ return rm && x>=rm.x && x<rm.x+rm.w && y>=rm.y && y<rm.y+rm.h; }

  S.monsters = []; S.items = []; S.traps = [];
  var freeTiles = [];
  for (var ty=0; ty<ROWS; ty++)
    for (var tx=0; tx<COLS; tx++){
      if (map[idx(tx,ty)] !== 1) continue;
      if (tx===S.px && ty===S.py) continue;
      if (S.stairs && tx===S.stairs.x && ty===S.stairs.y) continue;
      if (S.keeper && manhattan(tx,ty,S.keeper.x,S.keeper.y) <= 1) continue;
      if (inRoom(shopRoom,tx,ty)) continue;
      if (inRoom(vaultRoom,tx,ty)) continue;
      if (manhattan(tx,ty,S.px,S.py) <= 7) continue;
      freeTiles.push([tx,ty]);
    }
  function takeTile(){
    if (!freeTiles.length) return null;
    var k = irand(0, freeTiles.length-1);
    var t = freeTiles[k];
    freeTiles.splice(k,1);
    return t;
  }
  function takeTileOutsideBoss(){
    for (var tries=0; tries<30; tries++){
      var t = takeTile(); if (!t) return null;
      if (!inRoom(S.bossRoom, t[0], t[1])) return t;
    }
    return null;
  }

  function spawnMonster(def, x, y, opts){
    opts = opts || {};
    var hpBoost = depth - 1 + Math.max(0,(depth-6)*3);
    var atkBoost = Math.floor((depth-1)/3) + (depth>=7?2:0);
    var m = {
      id:S.nextId++, x:x, y:y, key:def.key,
      glyph:def.glyph, name:def.name, color:def.color,
      hp:def.hp+hpBoost, maxHp:def.hp+hpBoost,
      atk:def.atk+atkBoost, def:def.def,
      gold:def.gold, xp:def.xp||5, ai:def.ai||'melee',
      range:def.range||0, cool:def.cool||0, cd:0,
      slow:!!def.slow, poison:!!def.poison, burn:!!def.burn,
      proj:def.proj||'*', projColor:def.projColor||'#fff',
      awake:!!opts.awake, noticed:!!opts.awake, flashT:-9999,
      dotT:0, dotDmg:0,
      isBoss:def.key==='boss', isMini:def.key==='brood',
      champ:false, summon1:false, summon2:false, enraged:false
    };
    if (opts.champ){
      m.champ = true;
      m.hp = Math.round(m.hp*1.5); m.maxHp = m.hp;
      m.atk += 2; m.xp *= 2; m.gold *= 2;
      m.name = m.name+' champion';
    }
    S.monsters.push(m);
    return m;
  }
  function weightedDef(){
    // draw from the theme's pool so each depth band feels distinct
    var key = choice(S.theme.pool);
    for (var k=0; k<MON_TYPES.length; k++)
      if (MON_TYPES[k].key === key) return MON_TYPES[k];
    return MON_TYPES[0];
  }
  var nMon = isFinal ? 8 : (Math.min(16, 3 + Math.floor(depth*1.5)) + (isArena?4:0));
  if (S.modifier && S.modifier.key==='infested') nMon += 5;
  var champChance = rich ? 0.25 : 0.12;
  for (i=0; i<nMon; i++){
    var t = isFinal ? takeTileOutsideBoss() : takeTile();
    if (!t) break;
    spawnMonster(weightedDef(), t[0], t[1], { champ: Math.random()<champChance });
  }
  if (isFinal){
    var bx = far.cx, by = far.cy;
    spawnMonster(BOSS_DEF, bx, by);
    var best=null, bestD=-1;
    for (ty=far.y; ty<far.y+far.h; ty++)
      for (tx=far.x; tx<far.x+far.w; tx++){
        if (tx===bx && ty===by) continue;
        var dd = manhattan(tx,ty,S.px,S.py);
        if (dd > bestD){ bestD = dd; best = [tx,ty]; }
      }
    S.items.push({ x:best[0], y:best[1], type:'amulet' });
  }
  if (depth === 5 && S.stairs){
    var spot = null;
    for (var dd2=0; dd2<4 && !spot; dd2++){
      var sx2 = S.stairs.x+DIRS[dd2][0], sy2 = S.stairs.y+DIRS[dd2][1];
      if (inB(sx2,sy2) && map[idx(sx2,sy2)]===1 && !(sx2===S.px&&sy2===S.py)) spot=[sx2,sy2];
    }
    if (spot){
      var mb = spawnMonster(MINI_DEF, spot[0], spot[1]);
      mb.champ = true;
    }
  }

  // ---- items ----
  var nPotion = irand(2,3);
  for (i=0; i<nPotion; i++){ t = takeTile(); if (t) S.items.push({x:t[0],y:t[1],type:'potion'}); }
  var nGold = irand(3,5);
  var goldMul = rich ? 1.8 : 1;
  for (i=0; i<nGold; i++){ t = takeTile(); if (t) S.items.push({x:t[0],y:t[1],type:'gold', amt: Math.round((5 + irand(0, 8*depth))*goldMul)}); }
  if (Math.random() < 0.55){ t = takeTile(); if (t) S.items.push({x:t[0],y:t[1],type:'gear', gear:makeGear(depth,'weapon')}); }
  if (Math.random() < 0.55){ t = takeTile(); if (t) S.items.push({x:t[0],y:t[1],type:'gear', gear:makeGear(depth,'armor')}); }
  if (depth>=2 && Math.random() < 0.4){ t = takeTile(); if (t) S.items.push({x:t[0],y:t[1],type:'gear', gear:makeGear(depth,'helm')}); }
  if (depth>=3 && Math.random() < 0.4){ t = takeTile(); if (t) S.items.push({x:t[0],y:t[1],type:'gear', gear:makeGear(depth,'boots')}); }
  var nScroll = 1 + (Math.random()<0.5?1:0);
  for (i=0; i<nScroll; i++){
    t = takeTile();
    if (t){
      var roll = Math.random();
      var kind = roll<0.4 ? 'scroll_fire' : (roll<0.7 ? 'scroll_tele' : 'scroll_map');
      S.items.push({x:t[0],y:t[1],type:kind});
    }
  }
  if (Math.random() < 0.3){ t = takeTile(); if (t) S.items.push({x:t[0],y:t[1],type:'flask'}); }
  if (depth >= 2 && Math.random() < 0.35){
    t = takeTile();
    if (t) S.items.push({x:t[0],y:t[1],type:choice(RING_KINDS)});
  }
  if (Math.random() < 0.6){ t = takeTile(); if (t) S.items.push({x:t[0],y:t[1],type:'chest'}); }

  if (vaultRoom){
    var vtiles = [];
    for (ty=vaultRoom.y; ty<vaultRoom.y+vaultRoom.h; ty++)
      for (tx=vaultRoom.x; tx<vaultRoom.x+vaultRoom.w; tx++)
        vtiles.push([tx,ty]);
    var takeV = function(){ if(!vtiles.length) return null; var k=irand(0,vtiles.length-1); var t=vtiles[k]; vtiles.splice(k,1); return t; };
    t=takeV(); if(t) S.items.push({x:t[0],y:t[1],type:'chest'});
    t=takeV(); if(t) S.items.push({x:t[0],y:t[1],type:'chest'});
    t=takeV(); if(t) S.items.push({x:t[0],y:t[1],type:'gold', amt:20+10*depth});
    if (Math.random()<0.5){ t=takeV(); if(t) S.items.push({x:t[0],y:t[1],type:'gear', gear:makeGear(depth,null,'rare')}); }
    t=takeV(); if(t) S.traps.push({x:t[0],y:t[1],type:'dart',revealed:false,sprung:false});
    t=takeV(); if(t) S.traps.push({x:t[0],y:t[1],type:'spike',revealed:false,sprung:false});
  }

  var nTrap = Math.min(6, 1 + Math.floor(depth/2));
  for (i=0; i<nTrap; i++){
    t = takeTile();
    if (t) S.traps.push({ x:t[0], y:t[1], type: Math.random()<0.55?'spike':'dart', revealed:false, sprung:false });
  }

  // monster den: sleeping pack guarding a rare prize
  if (!isFinal && !isArena && depth>=2 && Math.random()<0.25 && rooms.length>4){
    var den = null;
    for (i=rooms.length-1; i>=2; i--){
      if (rooms[i]!==far && rooms[i]!==shopRoom && rooms[i]!==vaultRoom && rooms[i]!==rooms[0]){ den = rooms[i]; break; }
    }
    if (den){
      var dtiles = [];
      for (ty=den.y; ty<den.y+den.h; ty++)
        for (tx=den.x; tx<den.x+den.w; tx++)
          if (!occupied(tx,ty) && !itemAt(tx,ty)) dtiles.push([tx,ty]);
      var takeD = function(){ if(!dtiles.length) return null; var k=irand(0,dtiles.length-1); var t=dtiles[k]; dtiles.splice(k,1); return t; };
      for (i=0; i<3; i++){ t=takeD(); if (t) spawnMonster(weightedDef(), t[0], t[1], {}); }
      t=takeD(); if (t) S.items.push({x:t[0],y:t[1],type:'gear', gear:makeGear(depth,null,'rare')});
      t=takeD(); if (t) S.items.push({x:t[0],y:t[1],type:'gold', amt:Math.round((15+8*depth)*goldMul)});
    }
  }

  // altar event tile
  if (depth>=2 && depth<MAX_DEPTH && Math.random()<0.5){
    t = takeTile();
    if (t) S.items.push({x:t[0],y:t[1],type:'altar'});
  }

  if (hasPerk('memory')){
    for (i=0; i<rooms.length; i++){
      if (Math.random()<0.5) continue;
      var rm = rooms[i];
      for (ty=rm.y-1; ty<=rm.y+rm.h; ty++)
        for (tx=rm.x-1; tx<=rm.x+rm.w; tx++)
          if (inB(tx,ty)) seen[idx(tx,ty)] = 1;
    }
  }

  computeFOV();
  if (S.modifier)
    log('⚠ '+S.modifier.name+' — '+S.modifier.desc+'.', '#f0b46a');
}

function shopPrice(p){ return Math.round(p * (hasPerk('haggle') ? 0.8 : 1)); }

  ];

}

// ---------- FOV ----------
function computeFOV(){
  var vis = S.vis; vis.fill(0);
  var seen = S.seen, map = S.map;
  var px = S.px, py = S.py;
  var R = Math.max(4, S.fovR - (S.modifier && S.modifier.key==='dark' ? 3 : 0));
  vis[idx(px,py)] = 1; seen[idx(px,py)] = 1;
  for (var dy=-R; dy<=R; dy++){
    for (var dx=-R; dx<=R; dx++){
      if (dx*dx + dy*dy > R*R + 1) continue;
      var tx = px+dx, ty = py+dy;
      if (!inB(tx,ty)) continue;
      var cells = lineCells(px,py,tx,ty);
      for (var i=1; i<cells.length; i++){
        var ii = idx(cells[i][0], cells[i][1]);
        vis[ii] = 1; seen[ii] = 1;
        if (map[ii] === 0) break;
      }
    }
  }
}
function losClear(ax,ay,bx,by){
  var cells = lineCells(ax,ay,bx,by);
  for (var i=1; i<cells.length-1; i++)
    if (S.map[idx(cells[i][0],cells[i][1])] === 0) return false;
  return true;
}

// ---------- Queries ----------
function monsterAt(x,y){
  for (var i=0; i<S.monsters.length; i++)
    if (S.monsters[i].x===x && S.monsters[i].y===y) return S.monsters[i];
  return null;
}
function itemAt(x,y){
  for (var i=0; i<S.items.length; i++)
    if (S.items[i].x===x && S.items[i].y===y) return S.items[i];
  return null;
}
function trapAt(x,y){
  for (var i=0; i<S.traps.length; i++)
    if (S.traps[i].x===x && S.traps[i].y===y) return S.traps[i];
  return null;
}
function keeperAt(x,y){ return S.keeper && S.keeper.x===x && S.keeper.y===y; }
function occupied(x,y){
  return monsterAt(x,y) || keeperAt(x,y) || (x===S.px && y===S.py);
}
function visibleMonsterIds(){
  var set = {};
  for (var i=0; i<S.monsters.length; i++){
    var m = S.monsters[i];
    if (S.vis[idx(m.x,m.y)]) set[m.id] = true;
  }
  return set;
}

// ---------- Pathfinding ----------
function playerPassable(x,y){
  var ii = idx(x,y);
  if (S.map[ii] !== 1 || !S.seen[ii]) return false;
  if (keeperAt(x,y)) return false;
  if (S.vis[ii] && monsterAt(x,y)) return false;
  var t = trapAt(x,y);
  if (t && t.revealed && !t.sprung) return false;
  return true;
}
function targetOk(x,y){
  var ii = idx(x,y);
  if (S.map[ii] !== 1 || !S.seen[ii]) return false;
  if (keeperAt(x,y)) return false;
  if (S.vis[ii] && monsterAt(x,y)) return false;
  return true;
}
function bfsPath(tx,ty){
  if (!inB(tx,ty) || !targetOk(tx,ty)) return null;
  var prev = new Int16Array(COLS*ROWS); prev.fill(-2);
  var start = idx(S.px,S.py), target = idx(tx,ty);
  var q = [start]; prev[start] = -1;
  var head = 0;
  while (head < q.length){
    var cur = q[head++];
    if (cur === target) break;
    var cx = cur % COLS, cy = (cur-cx)/COLS;
    for (var d=0; d<4; d++){
      var nx = cx+DIRS[d][0], ny = cy+DIRS[d][1];
      if (!inB(nx,ny)) continue;
      var ni = idx(nx,ny);
      if (prev[ni] !== -2) continue;
      if (!(playerPassable(nx,ny) || (nx===tx && ny===ty))) continue;
      prev[ni] = cur;
      q.push(ni);
    }
  }
  if (prev[target] === -2) return null;
  var path = [], cur2 = target;
  while (cur2 !== -1 && cur2 !== start){
    path.push([cur2%COLS, Math.floor(cur2/COLS)]);
    cur2 = prev[cur2];
  }
  path.reverse();
  return path.length ? path : null;
}
function pathToAdjacent(gx,gy){
  var best = null;
  for (var d=0; d<4; d++){
    var ax = gx+DIRS[d][0], ay = gy+DIRS[d][1];
    if (!inB(ax,ay)) continue;
    if (ax===S.px && ay===S.py) return [];
    var p = bfsPath(ax,ay);
    if (p && (!best || p.length < best.length)) best = p;
  }
  return best;
}
function distField(){
  var dist = new Int16Array(COLS*ROWS); dist.fill(-1);
  var q = [idx(S.px,S.py)]; dist[q[0]] = 0;
  var head = 0;
  while (head < q.length){
    var cur = q[head++];
    var cx = cur%COLS, cy = (cur-cx)/COLS;
    for (var d=0; d<4; d++){
      var nx = cx+DIRS[d][0], ny = cy+DIRS[d][1];
      if (!inB(nx,ny)) continue;
      var ni = idx(nx,ny);
      if (dist[ni] !== -1 || S.map[ni] !== 1) continue;
      dist[ni] = dist[cur]+1;
      q.push(ni);
    }
  }
  return dist;
}

// ---------- Combat / damage ----------
function damageMonster(m, dmg, silent){
  m.hp -= dmg;
  m.awake = true;
  m.flashT = performance.now();
  addFloater(m.x, m.y, '-'+dmg, '#ffd75f');
  if (m.hp <= 0){
    S.kills++;
    var loot = goldGain(m.gold + irand(0, m.gold));
    S.gold += loot;
    log((m.isBoss||m.isMini ? 'The '+m.name+' falls!' : 'You slay the '+m.name+'!')+' (+'+loot+' gold)',
        m.isBoss||m.isMini ? '#ffd75f' : '#8fd18f');
    addFloater(m.x, m.y, '+'+loot+'$', '#ffd700');
    if (m.isBoss || m.isMini) addBoom(m.x, m.y);
    if (m.isMini && !itemAt(m.x,m.y))
      S.items.push({x:m.x,y:m.y,type:'gear', gear:makeGear(S.depth,null,'rare',true)});
    else if (m.champ && !m.isMini && Math.random()<0.45 && !itemAt(m.x,m.y)){
      if (Math.random()<0.5) S.items.push({x:m.x,y:m.y,type:'gear', gear:makeGear(S.depth)});
      else S.items.push({x:m.x,y:m.y,type:choice(['potion','flask','scroll_fire','scroll_tele'])});
    }
    S.xp += m.xp;
    addFloater(m.x, m.y, '+'+m.xp+'xp', '#9fb9ff');
    while (S.xp >= xpNeeded(S.level)){
      S.xp -= xpNeeded(S.level);
      S.level++;
      S.skillPts++;
      S.lvlPending = true;
    }
    sfx('kill');
    S.monsters.splice(S.monsters.indexOf(m),1);
    return true;
  }
  if (!silent) log('You hit the '+m.name+' for '+dmg+'.', '#c9d4e0');
  return false;
}
function playerAttack(m){
  var dmg = Math.max(1, pAtk() - m.def + irand(-1,2));
  sfx('hit');
  if (damageMonster(m, dmg) && sk('w_steal'))
    S.hp = Math.min(S.maxHp, S.hp+2);
}
function playerShoot(m){
  addProjectile(S.px,S.py,m.x,m.y,'»','#e8e0c0');
  sfx('shoot');
  var dmg = Math.max(1, rangedAtk() - m.def + irand(-1,2));
  var name = m.name;
  var dead = damageMonster(m, dmg, true);
  log(dead ? 'Your arrow fells the '+name+'!' : 'Your arrow hits the '+name+' for '+dmg+'.', '#c9d4e0');
}
function hurtPlayer(dmg, cause, color){
  S.hp -= dmg;
  addFloater(S.px, S.py, '-'+dmg, color||'#ff5c5c');
  sfx('hurt');
  shake(4);
  S.flashT = performance.now();
  if (S.hp <= 0){
    S.hp = 0;
    if (!S.causeOfDeath) S.causeOfDeath = cause;
  }
}
function applyPoison(turns,dmg){
  if (poisonImmune()){ log('Your blood neutralizes the venom.', '#7ee787'); return; }
  S.poison = { t:turns, dmg:dmg };
}
function monsterMelee(m, atkOverride){
  if (sk('r_dodge') && Math.random() < 0.15){
    addFloater(S.px, S.py, 'dodge!', '#7ec850');
    log('You slip aside from the '+m.name+'.', '#7ec850');
    return;
  }
  var atk = atkOverride || m.atk;
  var dmg = Math.max(1, atk - pDef() + irand(-1,2));
  hurtPlayer(dmg, 'Slain by a '+m.name+' on depth '+S.depth+'.');
  log('The '+m.name+' hits you for '+dmg+'.', '#ff8a8a');
  if (m.poison && Math.random() < 0.6){
    applyPoison(3 + Math.floor(S.depth/3), 2);
    if (!poisonImmune()) log('Venom courses through you!', '#7ee787');
  }
}
function monsterShoot(m){
  addProjectile(m.x, m.y, S.px, S.py, m.proj, m.projColor);
  var dmg = Math.max(1, m.atk + irand(0,2) - pDef());
  hurtPlayer(dmg, 'Shot down by a '+m.name+' on depth '+S.depth+'.', m.burn?'#ffb04f':'#ff5c5c');
  if (m.burn){
    S.burn = { t:2, dmg:2 };
    log('The '+m.name+"'s bolt sears you for "+dmg+'. You are burning!', '#ffb04f');
  } else {
    log('The '+m.name+' hits you for '+dmg+' from afar.', '#ff8a8a');
  }
  m.cd = m.cool;
}

// ---------- Monster AI ----------
function wander(m){
  if (Math.random() > 0.25) return;
  var d = choice(DIRS);
  var nx = m.x+d[0], ny = m.y+d[1];
  if (inB(nx,ny) && S.map[idx(nx,ny)]===1 && !occupied(nx,ny))
    { m.x = nx; m.y = ny; }
}
function chaseStep(m, dist){
  var here = dist[idx(m.x,m.y)];
  if (here === -1){ wander(m); return; }
  var options = [];
  for (var d=0; d<4; d++){
    var nx = m.x+DIRS[d][0], ny = m.y+DIRS[d][1];
    if (!inB(nx,ny)) continue;
    var v = dist[idx(nx,ny)];
    if (v === -1) continue;
    if (occupied(nx,ny)) continue;
    options.push({x:nx,y:ny,v:v});
  }
  if (options.length){
    options.sort(function(a,b){ return a.v-b.v || Math.random()-0.5; });
    if (options[0].v < here){ m.x = options[0].x; m.y = options[0].y; }
  }
}
function fleeStep(m, dist){
  var here = dist[idx(m.x,m.y)];
  var options = [];
  for (var d=0; d<4; d++){
    var nx = m.x+DIRS[d][0], ny = m.y+DIRS[d][1];
    if (!inB(nx,ny)) continue;
    var v = dist[idx(nx,ny)];
    if (v === -1 || v <= here) continue;
    if (occupied(nx,ny)) continue;
    options.push({x:nx,y:ny,v:v});
  }
  if (!options.length) return false;
  options.sort(function(a,b){ return b.v-a.v || Math.random()-0.5; });
  m.x = options[0].x; m.y = options[0].y;
  return true;
}
function phaseStep(m){
  var dx = S.px - m.x, dy = S.py - m.y;
  var tries = [];
  if (Math.abs(dx) >= Math.abs(dy)) tries = [[sign(dx),0],[0,sign(dy)]];
  else tries = [[0,sign(dy)],[sign(dx),0]];
  for (var i=0; i<tries.length; i++){
    if (!tries[i][0] && !tries[i][1]) continue;
    var nx = m.x+tries[i][0], ny = m.y+tries[i][1];
    if (nx>0 && ny>0 && nx<COLS-1 && ny<ROWS-1 && !occupied(nx,ny)){
      m.x = nx; m.y = ny; return;
    }
  }
}
function summonMinions(boss, keys, label){
  var placed = 0;
  for (var d=0; d<4 && placed<keys.length; d++){
    var nx = boss.x+DIRS[d][0], ny = boss.y+DIRS[d][1];
    if (!inB(nx,ny) || S.map[idx(nx,ny)]!==1 || occupied(nx,ny)) continue;
    var def = null;
    for (var k=0; k<MON_TYPES.length; k++)
      if (MON_TYPES[k].key===keys[placed]) def = MON_TYPES[k];
    if (!def) break;
    var hpBoost = S.depth-1, atkBoost = Math.floor((S.depth-1)/3);
    S.monsters.push({
      id:S.nextId++, x:nx, y:ny, key:def.key,
      glyph:def.glyph, name:def.name, color:def.color,
      hp:def.hp+hpBoost, maxHp:def.hp+hpBoost,
      atk:def.atk+atkBoost, def:def.def,
      gold:def.gold, xp:def.xp||5, ai:def.ai||'melee',
      range:def.range||0, cool:def.cool||0, cd:0,
      slow:!!def.slow, poison:!!def.poison, burn:!!def.burn,
      proj:def.proj||'*', projColor:def.projColor||'#fff',
      awake:true, noticed:true, flashT:-9999,
      dotT:0, dotDmg:0,
      isBoss:false, isMini:false, champ:false,
      summon1:false, summon2:false, enraged:false
    });
    placed++;
  }
  if (placed) log('The Warden '+label, '#ff8a8a');
}
function monsterTurn(m, dist){
  if (m.dotT > 0){
    m.dotT--;
    if (damageMonster(m, m.dotDmg, true)) return;
    addFloater(m.x, m.y, 'melt', '#9be05a');
  }
  if (m.slow && S.turn % 2 === 0) return;
  m.cd = Math.max(0, m.cd - 1);

  if (!m.awake){
    var dd = (m.x-S.px)*(m.x-S.px) + (m.y-S.py)*(m.y-S.py);
    if (dd <= 64 && (m.ai==='phase' || losClear(m.x,m.y,S.px,S.py))){
      m.awake = true;
      if (!m.noticed){
        m.noticed = true;
        if (S.vis[idx(m.x,m.y)]) log('The '+m.name+' notices you!', '#f0b46a');
      }
    }
    if (!m.awake){ wander(m); return; }
  }

  var adjacent = manhattan(m.x,m.y,S.px,S.py) === 1;
  var euclid = Math.sqrt((m.x-S.px)*(m.x-S.px)+(m.y-S.py)*(m.y-S.py));

  if (m.ai === 'boss'){
    if (!m.summon1 && m.hp <= m.maxHp*0.66){ m.summon1 = true; summonMinions(m, ['troll','wraith'], 'summons guardians!'); return; }
    if (!m.summon2 && m.hp <= m.maxHp*0.33){ m.summon2 = true; summonMinions(m, ['wraith','wraith'], 'calls the restless dead!'); return; }
    if (!m.enraged && m.hp <= m.maxHp*0.25){ m.enraged = true; m.atk += 5; log('The Warden roars in fury!', '#ff4f6e'); }
    if (adjacent){ monsterMelee(m); return; }
    if (m.hp <= m.maxHp*0.5 && m.cd<=0 && euclid <= m.range && losClear(m.x,m.y,S.px,S.py)){ monsterShoot(m); return; }
    chaseStep(m, dist);
    return;
  }
  if (m.ai === 'ranged'){
    if (adjacent){ monsterMelee(m, Math.max(1, m.atk-1)); return; }
    var canSee = losClear(m.x,m.y,S.px,S.py) && euclid <= m.range;
    if (canSee && manhattan(m.x,m.y,S.px,S.py) <= 2){
      if (fleeStep(m, dist)) return;
      if (m.cd<=0) monsterShoot(m);
      return;
    }
    if (canSee && m.cd<=0){ monsterShoot(m); return; }
    if (!canSee) chaseStep(m, dist);
    return;
  }
  if (m.ai === 'phase'){
    if (adjacent){ monsterMelee(m); return; }
    phaseStep(m);
    return;
  }
  if (adjacent){ monsterMelee(m); return; }
  chaseStep(m, dist);
}
function monstersAct(){
  var dist = distField();
  for (var i=S.monsters.length-1; i>=0; i--){
    if (S.hp <= 0) return;
    if (i >= S.monsters.length) continue;
    monsterTurn(S.monsters[i], dist);
  }
}

// ---------- Statuses / end of turn ----------
function tickStatus(){
  if (S.poison.t > 0){
    S.poison.t--;
    hurtPlayer(S.poison.dmg, 'Succumbed to poison on depth '+S.depth+'.', '#7ee787');
    if (S.poison.t === 0) log('The venom wears off.', '#7ee787');
  }
  if (S.burn.t > 0){
    S.burn.t--;
    hurtPlayer(S.burn.dmg, 'Burned to ash on depth '+S.depth+'.', '#ffb04f');
    if (S.burn.t === 0) log('The flames gutter out.', '#ffb04f');
  }
}
function revealAdjacentTraps(){
  var reach = sk('r_traps') ? 2 : 1;
  for (var i=0; i<S.traps.length; i++){
    var t = S.traps[i];
    if (!t.revealed && !t.sprung && manhattan(t.x,t.y,S.px,S.py) <= reach && S.vis[idx(t.x,t.y)]){
      t.revealed = true;
      log('You spot a '+(t.type==='spike'?'spike trap':'dart trap')+'!', '#f0b46a');
    }
  }
}
function shopProximity(){
  if (S.keeper && manhattan(S.px,S.py,S.keeper.x,S.keeper.y) <= 1){
    if (!S.shopGreeted || S.pendingShop){
      S.shopGreeted = true; S.pendingShop = false;
      stopWalk();
      ui.mode = 'shop';
      log('"Welcome, traveler. Have a look at my wares."', '#7fd4ff');
    }
  }
}
function openSkills(){
  stopWalk();
  ui.mode = 'levelup';   // skill-tree panel (mode name kept for harness compat)
}
function maybeLevelUp(){
  if (S.lvlPending && screen==='game' && ui.mode!=='levelup'){
    S.lvlPending = false;
    addFloater(S.px, S.py, 'LEVEL UP!', '#ffd75f');
    addBoom(S.px, S.py);
    log('↑ Level '+S.level+'! You gain a skill point.', '#ffd75f');
    sfx('level');
    openSkills();
  }
}
function endTurn(){
  S.turn++;
  S.abilityCd = Math.max(0, S.abilityCd-1);
  tickStatus();
  var rp = regenPower();
  if (rp > 0 && S.hp > 0 && S.hp < S.maxHp){
    S.regenT++;
    if (S.regenT >= 3){ S.regenT = 0; S.hp = Math.min(S.maxHp, S.hp+rp); }
  }
  computeFOV();
  revealAdjacentTraps();
  shopProximity();
  if (S.hp <= 0){ die(); return; }
  maybeLevelUp();
}
function bankSouls(win){
  var earned = S.depth*5 + S.kills*2 + (win?50:0);
  S.soulsEarned = earned;
  saveSouls(loadSouls() + earned);
}
function die(){
  stopWalk();
  ui.mode = 'play';
  saveBest(S.depth);
  bankSouls(false);
  screen = 'dead';
  sfx('death');
  startFade();
  log('You died.', '#ff5c5c');
}
function winGame(){
  stopWalk();
  ui.mode = 'play';
  saveBest(S.depth);
  lsSet('depths_wins', loadWins()+1);
  bankSouls(true);
  screen = 'win';
  sfx('win');
  startFade();
}

// ---------- Player actions ----------
function pickupGear(g){
  if (!S.equip[g.slot]){
    equipGear(g);
  } else if (S.pack.length < 10){
    S.pack.push(g);
    log('You stow the '+g.name+'.', gearColor(g));
  } else {
    S.gold += goldGain(8);
    log('Pack full — you sell the '+g.name+' for 8 gold.', '#7d8ea3');
  }
}
function equipGear(g){
  var old = S.equip[g.slot];
  if (old && old.cursed && old.known){
    log('The '+old.name+' is stuck to you! A shop can remove it.', '#ff5c5c');
    return false;
  }
  S.equip[g.slot] = g;
  if (old) S.pack.push(old);
  var pi = S.pack.indexOf(g);
  if (pi >= 0) S.pack.splice(pi,1);
  if (g.cursed && !g.known){
    g.known = true;
    log('A chill crawls over you — the '+g.name+' is CURSED! ('+affixText(g.curse)+')', '#ff5c5c');
  } else {
    log('You equip the '+g.name+'.', gearColor(g));
  }
  refreshDerived();
  return true;
}
function unequipSlot(slot){
  var g = S.equip[slot];
  if (!g) return;
  if (g.cursed && g.known){ log('The '+g.name+' will not come off!', '#ff5c5c'); return; }
  if (S.pack.length >= 10){ log('Your pack is full.', '#7d8ea3'); return; }
  S.equip[slot] = null;
  S.pack.push(g);
  log('You remove the '+g.name+'.', '#7d8ea3');
  refreshDerived();
}
function enterTile(x,y){
  S.px = x; S.py = y;

  var t = trapAt(x,y);
  if (t && !t.sprung){
    t.sprung = true; t.revealed = true;
    if (t.type === 'spike'){
      var dmg = 4 + S.depth;
      hurtPlayer(dmg, 'Impaled by a spike trap on depth '+S.depth+'.');
      log('Spikes shoot from the floor! ('+dmg+' damage)', '#ff8a8a');
    } else {
      applyPoison(3 + Math.floor(S.depth/3), 2);
      hurtPlayer(2, 'Slain by a poison dart on depth '+S.depth+'.', '#7ee787');
      log('A dart hits you — poison spreads!', '#7ee787');
    }
  }

  var it = itemAt(x,y);
  if (it){
    if (it.type === 'gold'){
      var amt = goldGain(it.amt);
      S.gold += amt;
      sfx('gold');
      log('You pick up '+amt+' gold.', '#ffd700');
      addFloater(x,y,'+'+amt+'$','#ffd700');
    } else if (it.type === 'gear'){
      pickupGear(it.gear);
    } else if (it.type === 'chest'){
      openChest(x,y);
    } else if (it.type === 'amulet'){
      log('You seize the Amulet of Yendor!', '#c9a0ff');
      S.items.splice(S.items.indexOf(it),1);
      winGame();
      return;
    } else if (it.type === 'altar'){
      stopWalk();
      ui.mode = 'event';
      log('A blood-dark altar hums beneath your feet...', '#c9a0ff');
      return;   // altar stays until a choice is made
    } else if (KIND_INFO[it.type]){
      invAdd(it.type,1);
      sfx('pickup');
      log('You pick up a '+KIND_INFO[it.type].name+'.', KIND_INFO[it.type].color);
    }
    var k = S.items.indexOf(it);
    if (k >= 0) S.items.splice(k,1);
  }
  if (S.stairs && x===S.stairs.x && y===S.stairs.y)
    log('Stairs down. Click your tile to descend.', '#e8d9a0');
}
function openChest(x,y){
  addBoom(x,y);
  var roll = Math.random();
  if (roll < 0.4){
    var amt = goldGain(15 + 10*S.depth + irand(0,10));
    S.gold += amt;
    log('The chest holds '+amt+' gold!', '#ffd700');
    addFloater(x,y,'+'+amt+'$','#ffd700');
  } else if (roll < 0.7){
    var kind;
    var r2 = Math.random();
    if (r2 < 0.3) kind = 'potion';
    else if (r2 < 0.45) kind = 'flask';
    else if (r2 < 0.75) kind = choice(SCROLL_KINDS);
    else kind = choice(RING_KINDS);
    invAdd(kind,1);
    log('The chest holds a '+KIND_INFO[kind].name+'!', KIND_INFO[kind].color);
  } else {
    var g = makeGear(S.depth, null, Math.random()<0.3?'rare':'magic');
    log('The chest holds a '+g.name+'!', gearColor(g));
    pickupGear(g);
  }
}
function descend(){
  var d = S.depth + 1;
  S.baseMaxHp += 6;
  refreshDerived();
  var heal = Math.floor((S.maxHp - S.hp) * 0.4);
  S.hp = Math.min(S.maxHp, S.hp + heal);
  saveBest(d);
  genFloor(d);
  walkQueue = []; walkAttack = null; hoverPath = null;
  sfx('descend');
  log('You descend to depth '+d+'. (+'+heal+' HP)', '#e8d9a0');
  if (d === MAX_DEPTH) log('A dreadful presence stirs here...', '#ff4f6e');
  else if (d === 5) log('Something skitters in the dark ahead...', '#9be05a');
  else if (d >= 6) log('The air grows heavy. Beware.', '#f0b46a');
}
function drinkPotion(){
  if (invCount('potion') <= 0){ log('You have no potions.', '#7d8ea3'); return; }
  if (S.hp >= S.maxHp){ log('You are already at full health.', '#7d8ea3'); return; }
  invRemove('potion',1);
  var heal = potionHeal();
  S.hp = Math.min(S.maxHp, S.hp + heal);
  addFloater(S.px, S.py, '+'+heal, '#7ee787');
  sfx('potion');
  if (sk('a_cleanse') && (S.poison.t>0 || S.burn.t>0)){
    S.poison.t = 0; S.burn.t = 0;
    log('You drink a potion. (+'+heal+' HP, ailments cured)', '#7ee787');
  } else {
    log('You drink a potion. (+'+heal+' HP)', '#7ee787');
  }
  monstersAct();
  endTurn();
}
function readTeleport(){
  invRemove('scroll_tele',1);
  var best = null;
  for (var tries=0; tries<60; tries++){
    var x = irand(1,COLS-2), y = irand(1,ROWS-2);
    if (S.map[idx(x,y)] !== 1 || occupied(x,y) || trapAt(x,y)) continue;
    var minD = 999;
    for (var i=0; i<S.monsters.length; i++)
      minD = Math.min(minD, manhattan(x,y,S.monsters[i].x,S.monsters[i].y));
    if (minD >= 6){ best = [x,y]; break; }
    if (!best) best = [x,y];
  }
  if (best){
    addBoom(S.px,S.py);
    S.px = best[0]; S.py = best[1];
    addBoom(S.px,S.py);
    log('Reality folds — you are elsewhere.', '#7fd4ff');
  } else {
    log('The scroll fizzles.', '#7d8ea3');
  }
  monstersAct();
  endTurn();
}
function readMapping(){
  invRemove('scroll_map',1);
  for (var i=0; i<S.seen.length; i++) S.seen[i] = 1;
  for (var t=0; t<S.traps.length; t++) if (!S.traps[t].sprung) S.traps[t].revealed = true;
  log("The floor's layout burns into your mind.", '#c9a0ff');
  monstersAct();
  endTurn();
}
function castFireball(tx,ty){
  invRemove('scroll_fire',1);
  ui.mode = 'play'; ui.targetKind = null;
  addProjectile(S.px,S.py,tx,ty,'✦','#ffb04f');
  addBoom(tx,ty);
  shake(6);
  var dmg = fireballDmg();
  var hits = 0;
  for (var i=S.monsters.length-1; i>=0; i--){
    var m = S.monsters[i];
    if (cheby(m.x,m.y,tx,ty) <= 2 && S.vis[idx(m.x,m.y)]){
      hits++;
      damageMonster(m, dmg + irand(0,4), true);
    }
  }
  log(hits ? 'The fireball engulfs '+hits+' '+(hits===1?'foe':'foes')+'!' : 'The fireball scorches empty stone.', '#ffb04f');
  monstersAct();
  endTurn();
}
function throwAcid(tx,ty){
  invRemove('flask',1);
  ui.mode = 'play'; ui.targetKind = null;
  addProjectile(S.px,S.py,tx,ty,'!','#9be05a');
  addBoom(tx,ty);
  sfx('boom');
  var dmg = acidDmg();
  var rad = sk('a_aoe') ? 2 : 1;
  var hits = 0;
  for (var i=S.monsters.length-1; i>=0; i--){
    var m = S.monsters[i];
    if (cheby(m.x,m.y,tx,ty) <= rad && S.vis[idx(m.x,m.y)]){
      hits++;
      if (!damageMonster(m, dmg + irand(0,3), true)){
        m.dotT = sk('a_melt') ? 6 : 3; m.dotDmg = 2;
      }
    }
  }
  log(hits ? 'Acid splashes over '+hits+' '+(hits===1?'foe — it melts!':'foes — they melt!') : 'The flask shatters on stone.', '#9be05a');
  monstersAct();
  endTurn();
}
function equipRing(kind){
  invRemove(kind,1);
  var slot = S.rings[0]===null ? 0 : (S.rings[1]===null ? 1 : 0);
  if (S.rings[slot] !== null){
    invAdd(S.rings[slot],1);
    log('You swap out the '+KIND_INFO[S.rings[slot]].name+'.', '#7d8ea3');
  }
  S.rings[slot] = kind;
  log('You slip on the '+KIND_INFO[kind].name+'.', KIND_INFO[kind].color);
  monstersAct();
  endTurn();
}
function unequipRing(slot){
  if (S.rings[slot] === null) return;
  invAdd(S.rings[slot],1);
  log('You remove the '+KIND_INFO[S.rings[slot]].name+'.', '#7d8ea3');
  S.rings[slot] = null;
}
function playerStep(nx,ny){
  if (!inB(nx,ny) || S.map[idx(nx,ny)] !== 1) return false;
  if (keeperAt(nx,ny)){ S.pendingShop = true; shopProximity(); return false; }
  var m = monsterAt(nx,ny);
  if (m){ playerAttack(m); monstersAct(); endTurn(); return true; }
  enterTile(nx,ny);
  if (screen !== 'game') return true;
  monstersAct();
  endTurn();
  return true;
}
function playerWait(){
  log('You wait.', '#7d8ea3');
  monstersAct();
  endTurn();
}

// ---------- Abilities ----------
function useAbility(){
  if (S.abilityCd > 0){ log(ABILITIES[S.cls].name+' is on cooldown ('+S.abilityCd+').', '#7d8ea3'); return; }
  var a = ABILITIES[S.cls].key;
  if (a === 'whirlwind'){
    var targets = S.monsters.filter(function(m){ return manhattan(m.x,m.y,S.px,S.py)===1; });
    if (!targets.length){ log('No enemies in reach for Whirlwind.', '#7d8ea3'); return; }
    shake(5);
    addBoom(S.px,S.py);
    sfx('boom');
    var mult = sk('w_exec') ? 1.5 : 1;
    for (var i=targets.length-1; i>=0; i--){
      var m = targets[i];
      var dead = damageMonster(m, Math.max(1, Math.round((pAtk()+1)*mult) - m.def + irand(0,2)), true);
      if (dead && sk('w_steal')) S.hp = Math.min(S.maxHp, S.hp+2);
    }
    log('You whirl, striking '+targets.length+' '+(targets.length===1?'enemy':'enemies')+'!', '#ff8b5c');
    S.abilityCd = abilityCdMax();
    monstersAct();
    endTurn();
    return;
  }
  if (a === 'volley'){
    if (!hasBow()){ log('You need a bow to loose a volley.', '#7d8ea3'); return; }
    var range = bowRangeCur();
    var inRange = S.monsters.filter(function(m){
      return S.vis[idx(m.x,m.y)] && cheby(m.x,m.y,S.px,S.py) <= range && losClear(m.x,m.y,S.px,S.py);
    });
    if (!inRange.length){ log('No targets in bow range for Volley.', '#7d8ea3'); return; }
    inRange.sort(function(m1,m2){ return cheby(m1.x,m1.y,S.px,S.py)-cheby(m2.x,m2.y,S.px,S.py); });
    var shots = sk('r_volley') ? 4 : 3, hitsCount = 0;
    sfx('shoot');
    while (shots-- > 0){
      var live = inRange.filter(function(m){ return S.monsters.indexOf(m)>=0; });
      if (!live.length) break;
      var tgt = live[hitsCount % live.length];
      addProjectile(S.px,S.py,tgt.x,tgt.y,'»','#e8e0c0');
      damageMonster(tgt, Math.max(1, rangedAtk() - tgt.def + irand(-1,2)), true);
      hitsCount++;
    }
    log('You loose a volley of '+hitsCount+' arrows!', '#7ec850');
    S.abilityCd = abilityCdMax();
    monstersAct();
    endTurn();
    return;
  }
  if (a === 'transmute'){
    var any = invKinds().length > 0 || S.pack.length > 0;
    if (!any){ log('Nothing to transmute.', '#7d8ea3'); return; }
    S.transmuting = true;
    ui.mode = 'inventory';
    log('Transmute: click an item to reroll it.', '#c9a0ff');
    return;
  }
}
function transmuteKind(kind){
  invRemove(kind,1);
  var pool = CONSUME_KINDS.filter(function(k){ return k!==kind; });
  var nk = choice(pool);
  invAdd(nk,1);
  addBoom(S.px,S.py);
  log('The '+KIND_INFO[kind].name+' becomes a '+KIND_INFO[nk].name+'!', '#c9a0ff');
  finishTransmute();
}
function transmuteGear(i){
  var old = S.pack[i];
  if (!old) return;
  var g = makeGear(S.depth, old.slot);
  S.pack[i] = g;
  addBoom(S.px,S.py);
  log('The '+old.name+' reshapes into a '+g.name+'!', '#c9a0ff');
  finishTransmute();
}
function finishTransmute(){
  S.transmuting = false;
  ui.mode = 'play';
  S.abilityCd = abilityCdMax();
  monstersAct();
  endTurn();
}

// ---------- Shop ----------
function shopServiceRows(){
  var rows = [];
  for (var i=0; i<GEAR_SLOTS.length; i++){
    var g = S.equip[GEAR_SLOTS[i]];
    if (g && g.cursed && g.known)
      rows.push({ service:'uncurse', slot:GEAR_SLOTS[i], price:shopPrice(35*S.depth), name:'Uncurse '+g.name });
  }
  var spent = 0;
  for (var k in S.skills) if (S.skills[k]) spent++;
  if (spent > 0)
    rows.push({ service:'respec', price:shopPrice(100 + 60*S.respecs), name:'Respec skills ('+spent+' points back)' });
  return rows;
}
function buyWare(i){
  var w = S.shopWares[i];
  if (!w) return;
  if (S.gold < w.price){ log('"You cannot afford that."', '#7d8ea3'); return; }
  S.gold -= w.price;
  sfx('gold');
  if (w.kind === 'gear'){
    log('You buy the '+w.gear.name+'.', gearColor(w.gear));
    pickupGear(w.gear);
  } else if (w.kind === 'crate'){
    var roll = Math.random();
    if (roll < 0.15){
      var g = makeGear(S.depth+1, null, 'rare', true);
      log('The crate holds a '+g.name+'!', gearColor(g));
      pickupGear(g);
    } else if (roll < 0.5){
      var g2 = makeGear(S.depth+1, null, 'magic', true);
      log('The crate holds a '+g2.name+'.', gearColor(g2));
      pickupGear(g2);
    } else if (roll < 0.8){
      var kind = choice(['potion','potion','flask','scroll_fire','scroll_tele','scroll_map',choice(RING_KINDS)]);
      invAdd(kind, 1);
      var kind2 = choice(['potion','flask']);
      invAdd(kind2, 1);
      log('The crate holds a '+KIND_INFO[kind].name+' and a '+KIND_INFO[kind2].name+'.', '#c9d4e0');
    } else {
      S.gold += 10;
      log('The crate holds... straw. And 10 gold.', '#7d8ea3');
    }
  } else {
    invAdd(w.kind,1);
    log('You buy a '+KIND_INFO[w.kind].name+'.', KIND_INFO[w.kind].color);
  }
  S.shopWares.splice(i,1);
}
function buyService(row){
  if (S.gold < row.price){ log('"That service costs coin."', '#7d8ea3'); return; }
  if (row.service === 'uncurse'){
    var g = S.equip[row.slot];
    if (!g || !g.cursed) return;
    S.gold -= row.price;
    sfx('gold');
    g.cursed = false; g.curse = null;
    log('The shopkeeper mutters a rite — the '+g.name+' is cleansed!', '#7fd4ff');
    refreshDerived();
    return;
  }
  if (row.service === 'respec'){
    S.gold -= row.price;
    S.respecs++;
    sfx('level');
    respecSkills();
  }
}
function canSellHere(){
  return !!(S.keeper && manhattan(S.px,S.py,S.keeper.x,S.keeper.y) <= 1);
}
function sellPackGear(i){
  var g = S.pack[i];
  if (!g) return;
  var v = sellPrice(gearValue(g));
  S.pack.splice(i,1);
  S.gold += v;
  sfx('gold');
  log('Sold the '+g.name+' for '+v+' gold.', '#ffd700');
}
function sellKind(kind){
  if (invCount(kind) <= 0) return;
  invRemove(kind,1);
  var v = sellPrice(KIND_VALUE[kind]||10);
  S.gold += v;
  sfx('gold');
  log('Sold a '+KIND_INFO[kind].name+' for '+v+' gold.', '#ffd700');
}

// ---------- Altar event ----------
function eventLayout(){
  var w = Math.min(430, Math.max(300, W-30));
  var h = 96 + 3*46 + 14;
  var p = panelBase(w,h);
  var rows = [];
  for (var i=0; i<3; i++)
    rows.push({ i:i, rect:{ x:p.x+12, y:p.y+86+i*46, w:w-24, h:40 } });
  return { panel:p, rows:rows };
}
function removeAltarHere(){
  var it = itemAt(S.px,S.py);
  if (it && it.type==='altar') S.items.splice(S.items.indexOf(it),1);
}
function eventChoose(i){
  var cost = Math.floor(S.maxHp*0.2);
  if (i === 0){   // offer blood
    if (S.hp <= cost+1){ log('You are too weak to offer blood.', '#7d8ea3'); return; }
    S.hp -= cost;
    addFloater(S.px,S.py,'-'+cost,'#ff5c5c');
    addBoom(S.px,S.py);
    sfx('hurt');
    var roll = Math.random();
    if (roll < 0.6){
      var g = makeGear(S.depth, null, 'rare');
      log('The altar drinks deep — a '+g.name+' rises from the stone!', '#ffd75f');
      pickupGear(g);
    } else if (roll < 0.85){
      var amt = 30 + 15*S.depth;
      S.gold += amt;
      log('The altar drinks deep — '+amt+' gold wells up.', '#ffd700');
    } else {
      invAdd('potion',2);
      log('The altar drinks deep — two potions condense from the air.', '#ff7fb1');
    }
    removeAltarHere();
    ui.mode = 'play';
    return;
  }
  if (i === 1){   // pray
    var roll2 = Math.random();
    if (roll2 < 0.4){
      S.hp = S.maxHp;
      sfx('potion');
      log('Warm light floods you — fully healed.', '#7ee787');
    } else if (roll2 < 0.7){
      S.gold += 25;
      sfx('gold');
      log('A small blessing: 25 gold at your feet.', '#ffd700');
    } else {
      applyPoison(4, 2);
      sfx('hurt');
      log('The altar demands more than words. You feel ill.', '#7ee787');
    }
    removeAltarHere();
    ui.mode = 'play';
    return;
  }
  ui.mode = 'play';   // leave: altar remains
  log('You step back from the altar.', '#7d8ea3');
}
function eventClick(mx,my){
  var L = eventLayout();
  if (!hit(L.panel,mx,my)){ eventChoose(2); return; }
  for (var i=0; i<L.rows.length; i++)
    if (hit(L.rows[i].rect,mx,my)){ eventChoose(L.rows[i].i); return; }
}
function drawEvent(){
  var L = eventLayout(), p = L.panel;
  ctx.fillStyle = 'rgba(5,7,10,0.6)';
  ctx.fillRect(0,0,W,H);

    ['Offer blood ('+cost+' HP)', 'It rewards sacrifice... usually.', '#ff5c5c'],

  ];
  for (var i=0; i<L.rows.length; i++){

// ---------- Auto-walk ----------
function startWalk(path, attackTarget){
  walkQueue = path.slice();
  walkAttack = attackTarget || null;
  walkKnown = visibleMonsterIds();
  lastStep = 0;
}
function stopWalk(){ walkQueue = []; walkAttack = null; }
function rangerCanShoot(m){
  if (S.cls !== 'ranger' || !hasBow()) return false;
  var d = cheby(m.x,m.y,S.px,S.py);
  return d >= 2 && d <= bowRangeCur() &&
         S.vis[idx(m.x,m.y)] && losClear(m.x,m.y,S.px,S.py);
}
function walkTick(now){
  if (menuOpen || ui.mode !== 'play') return;
  if (!walkQueue.length && !walkAttack) return;
  if (now - lastStep < STEP_MS) return;
  lastStep = now;

  if (walkAttack){
    var m = walkAttack;
    if (S.monsters.indexOf(m) === -1){ walkAttack = null; }
    else if (manhattan(m.x,m.y,S.px,S.py) === 1){
      stopWalk();
      playerAttack(m);
      monstersAct();
      endTurn();
      return;
    }
    else if (rangerCanShoot(m)){
      stopWalk();
      playerShoot(m);
      monstersAct();
      endTurn();
      return;
    }
  }
  if (!walkQueue.length){ walkAttack = null; return; }

  var next = walkQueue.shift();
  var isFinal = walkQueue.length === 0;
  var blocker = monsterAt(next[0], next[1]);
  if (blocker){
    stopWalk();
    if (S.vis[idx(blocker.x,blocker.y)])
      log('A '+blocker.name+' blocks your path.', '#f0b46a');
    return;
  }
  var trap = trapAt(next[0], next[1]);
  if (trap && trap.revealed && !trap.sprung && !isFinal){
    stopWalk();
    log('A trap blocks the way. You halt.', '#f0b46a');
    return;
  }
  var hpBefore = S.hp;
  enterTile(next[0], next[1]);
  if (screen !== 'game'){ stopWalk(); return; }
  monstersAct();
  endTurn();
  if (screen !== 'game' || ui.mode !== 'play'){ stopWalk(); return; }

  if (S.hp < hpBefore){ stopWalk(); return; }
  var visNow = visibleMonsterIds();
  for (var id in visNow){
    if (!walkKnown[id]){
      stopWalk();
      log('An enemy comes into view. You halt.', '#f0b46a');
      return;
    }
  }
}

// ---------- UI layouts (pure; shared by draw + click) ----------
function hudLayout(){
  var top = H - HUD_H;
  var mobile = W < 700;
  var x = mobile ? 10 : 14, y = mobile ? top+118 : top+96, h = mobile ? 30 : 24, gap = mobile ? 6 : 8;
  var L = { top:top };
  L.potion = { x:x, y:y, w:mobile?100:110, h:h }; x += (mobile?100:110)+gap;
  L.level = { x:42, y:top+22, w:216, h:14 };   // XP bar + Lv label: click to open skills
  if (S && (S.cls==='alchemist' || invCount('flask')>0)){
    L.flask = { x:x, y:y, w:mobile?82:96, h:h }; x += (mobile?82:96)+gap;
  } else L.flask = null;
  L.ability = { x:x, y:y, w:118, h:h }; x += 118+gap;
  if(mobile){ x=10; y=top+154; }
  L.inv = { x:x, y:y, w:mobile?110:92, h:h }; x += (mobile?110:92)+gap;
  L.map = { x:x, y:y, w:mobile?70:50, h:h };
  return L;
}
function panelBase(w,h){
  var mapH = H - HUD_H;
  return { x:Math.round((W-w)/2), y:Math.max(8, Math.round((mapH-h)/2)), w:w, h:h };
}
function invLayout(){
  var rowH = 26;
  var w = Math.min(460, Math.max(300, W-30));
  var rows = [];
  var slots = GEAR_SLOTS;
  var kinds = invKinds();
  var nRows = slots.length + 2 + S.pack.length + kinds.length;
  var h = Math.min(H-HUD_H-16, 96 + nRows*rowH + 30);
  var p = panelBase(w,h);
  var y = p.y + 58;
  var i;
  for (i=0; i<slots.length; i++){
    rows.push({ type:'slot', slot:slots[i], rect:{x:p.x+12, y:y, w:w-24, h:rowH-3} });
    y += rowH;
  }
  for (i=0; i<2; i++){
    rows.push({ type:'ring', ringSlot:i, rect:{x:p.x+12, y:y, w:w-24, h:rowH-3} });
    y += rowH;
  }
  y += 12;
  // pack grouped by slot for scannability (row.i stays the true pack index)
  var order = [];
  for (var so=0; so<GEAR_SLOTS.length; so++)
    for (i=0; i<S.pack.length; i++)
      if (S.pack[i].slot === GEAR_SLOTS[so]) order.push(i);
  for (var oi=0; oi<order.length; oi++){
    rows.push({ type:'pack', i:order[oi], rect:{x:p.x+12, y:y, w:w-24, h:rowH-3} });
    y += rowH;
  }
  y += S.pack.length ? 12 : 0;
  for (i=0; i<kinds.length; i++){
    rows.push({ type:'use', kind:kinds[i], rect:{x:p.x+12, y:y, w:w-24, h:rowH-3} });
    y += rowH;
  }
  return { panel:p, close:{x:p.x+w-32, y:p.y+8, w:24, h:24}, rows:rows, sellW:70 };
}
function shopLayout(){
  var wares = S.shopWares || [];
  var services = shopServiceRows();
  var sellables = S.pack.slice(0, 6);   // sell section: pack gear
  var rowH = 36, sellH = 26;

    rows.push({ type:'service', service:services[i], rect:{ x:p.x+12, y:y0+(wares.length+i)*rowH, w:w-24, h:rowH-4 } });

  return { panel:p, close:{ x:p.x+w-32, y:p.y+8, w:24, h:24 }, rows:rows, sellY:ySell-18 };

function levelLayout(){

  var w = Math.min(620, Math.max(320, W-30));

function endLayout(){

// ---------- Input ----------
function tileFromPixel(mx,my){
  var tx = Math.floor((mx-offX)/tile), ty = Math.floor((my-offY)/tile);
  return inB(tx,ty) ? [tx,ty] : null;
}
canvas.addEventListener('mousemove', function(e){
  mouseX = e.clientX; mouseY = e.clientY;
  if (screen !== 'game' || ui.mode === 'inventory' || ui.mode === 'shop' || ui.mode === 'levelup' || ui.mode === 'event'){
    hoverPath = null; hoverTX = -1; hoverTY = -1; return;
  }
  var t = tileFromPixel(mouseX, mouseY);
  var tx = t ? t[0] : -1, ty = t ? t[1] : -1;
  if (tx === hoverTX && ty === hoverTY) return;
  hoverTX = tx; hoverTY = ty;
  hoverPath = null;
  if (ui.mode === 'target') return;
  if (tx < 0) return;
  if (tx === S.px && ty === S.py) return;
  var ii = idx(tx,ty);
  if (!S.seen[ii]) return;
  var m = S.vis[ii] ? monsterAt(tx,ty) : null;
  if (m && rangerCanShoot(m)) return;
  if (m || keeperAt(tx,ty)){
    hoverPath = pathToAdjacent(tx,ty);
  } else if (S.map[ii] === 1){
    hoverPath = bfsPath(tx,ty);
  }
});
canvas.addEventListener('mouseleave', function(){
  hoverTX = -1; hoverTY = -1; hoverPath = null; mouseX = -1; mouseY = -1;
});
canvas.addEventListener('contextmenu', function(e){ e.preventDefault(); });

canvas.addEventListener('mousedown', function(e){
  if (e.button !== 0) return;
  e.preventDefault();
  if (menuOpen) return;
  layoutFresh();
  var mx = e.clientX, my = e.clientY;

  if (screen === 'title'){ titleClick(mx,my); return; }
  if (screen === 'dead' || screen === 'win'){
    if (hit(endLayout().newRun, mx, my)){ screen = 'title'; startFade(); }
    return;
  }

  if (ui.mode === 'levelup'){ levelClick(mx,my); return; }
  if (ui.mode === 'event'){ eventClick(mx,my); return; }
  if (ui.mode === 'inventory'){ invClick(mx,my); return; }
  if (ui.mode === 'shop'){ shopClick(mx,my); return; }
  if (ui.mode === 'target'){ targetClick(mx,my); return; }

  // ---- play mode ----
  stopWalk();
  var hud = hudLayout();
  if (hit(hud.level,mx,my)){ openSkills(); return; }
  if (hit(hud.potion,mx,my)){ drinkPotion(); return; }
  if (hud.flask && hit(hud.flask,mx,my)){
    if (invCount('flask') <= 0){ log('You have no acid flasks.', '#7d8ea3'); return; }
    ui.mode = 'target'; ui.targetKind = 'acid';
    log('Acid flask: click a lit tile. (Anywhere else cancels)', '#9be05a');
    return;
  }
  if (hit(hud.ability,mx,my)){ useAbility(); return; }
  if (hit(hud.inv,mx,my)){ ui.mode = 'inventory'; return; }
  if (hit(hud.map,mx,my)){ minimapOn = !minimapOn; return; }
  if (my > H - HUD_H) return;

  var t = tileFromPixel(mx,my);
  if (!t) return;
  var tx = t[0], ty = t[1];

  if (tx===S.px && ty===S.py){
    if (S.stairs && tx===S.stairs.x && ty===S.stairs.y) descend();
    else playerWait();
    return;
  }
  var ii = idx(tx,ty);
  if (!S.seen[ii]){ log('You have not explored that area.', '#7d8ea3'); return; }

  if (keeperAt(tx,ty)){
    if (manhattan(tx,ty,S.px,S.py) <= 1){
      S.pendingShop = true;
      shopProximity();
    } else {
      var kp = pathToAdjacent(tx,ty);
      if (kp && kp.length){ S.pendingShop = true; startWalk(kp,null); }
      else if (kp){ S.pendingShop = true; shopProximity(); }
      else log('You cannot reach the shopkeeper.', '#7d8ea3');
    }
    return;
  }

  var m = S.vis[ii] ? monsterAt(tx,ty) : null;
  if (m){
    if (rangerCanShoot(m)){
      playerShoot(m);
      monstersAct();
      endTurn();
      return;
    }
    if (manhattan(m.x,m.y,S.px,S.py) === 1){
      playerAttack(m);
      monstersAct();
      endTurn();
    } else {
      var ap = pathToAdjacent(tx,ty);
      if (ap && ap.length) startWalk(ap, m);
      else if (!ap) log('You cannot reach the '+m.name+'.', '#7d8ea3');
    }
    return;
  }

  if (S.map[ii] !== 1) return;

  var path = bfsPath(tx,ty);
  if (!path){ log('You cannot find a way there.', '#7d8ea3'); return; }
  if (path.length === 1){
    var tr = trapAt(tx,ty);
    if (tr && tr.revealed && !tr.sprung) log('You step carefully onto the trap...', '#f0b46a');
    playerStep(path[0][0], path[0][1]);
  }
  else startWalk(path, null);
});

function titleClick(mx,my){
  if (titleShrine){
    var SL = shrineLayout();
    if (hit(SL.close,mx,my) || !hit(SL.panel,mx,my)){ titleShrine = false; return; }
    for (var i=0; i<SL.rows.length; i++){
      if (hit(SL.rows[i].rect,mx,my)){
        var perk = PERKS[SL.rows[i].i];
        var perks = loadPerks();
        if (perks[perk.key]) return;
        var souls = loadSouls();
        if (souls < perk.cost) return;
        saveSouls(souls - perk.cost);
        perks[perk.key] = true;
        savePerks(perks);
        return;
      }
    }
    return;
  }
  var TL = titleLayout();
  if (hit(TL.shrine,mx,my)){ titleShrine = true; return; }
  for (var c=0; c<TL.cards.length; c++){
    if (hit(TL.cards[c].rect,mx,my)){ newRun(TL.cards[c].key); return; }
  }
}
function levelClick(mx,my){
  var L = levelLayout();
  if (hit(L.close,mx,my) || !hit(L.panel,mx,my)){ ui.mode = 'play'; return; }
  for (var i=0; i<L.rows.length; i++){
    if (hit(L.rows[i].rect,mx,my)){
      takeSkill(L.rows[i].key);
      if (S.skillPts <= 0) ui.mode = 'play';   // spent the last point: resume
      return;
    }
  }
}
function invClick(mx,my){
  var L = invLayout();
  if (hit(L.close,mx,my) || !hit(L.panel,mx,my)){
    ui.mode = 'play';
    if (S.transmuting){ S.transmuting = false; log('You pocket the catalyst.', '#7d8ea3'); }
    return;
  }
  for (var i=0; i<L.rows.length; i++){
    var row = L.rows[i];
    if (!hit(row.rect,mx,my)) continue;
    if (row.type === 'slot'){
      if (!S.transmuting) unequipSlot(row.slot);
      return;
    }
    if (row.type === 'ring'){
      if (!S.transmuting) unequipRing(row.ringSlot);
      return;
    }
    if (row.type === 'pack'){
      if (S.transmuting){ transmuteGear(row.i); return; }
      if (canSellHere() && mx > row.rect.x+row.rect.w-L.sellW){ sellPackGear(row.i); return; }
      equipGear(S.pack[row.i]);
      return;
    }
    if (row.type === 'use'){
      var kind = row.kind;
      if (S.transmuting){ transmuteKind(kind); return; }
      if (canSellHere() && mx > row.rect.x+row.rect.w-L.sellW){ sellKind(kind); return; }
      if (kind === 'potion'){ ui.mode='play'; drinkPotion(); }
      else if (kind === 'flask'){
        ui.mode = 'target'; ui.targetKind = 'acid';
        log('Acid flask: click a lit tile. (Anywhere else cancels)', '#9be05a');
      }
      else if (kind === 'scroll_tele'){ ui.mode='play'; readTeleport(); }
      else if (kind === 'scroll_map'){ ui.mode='play'; readMapping(); }
      else if (kind === 'scroll_fire'){
        ui.mode = 'target'; ui.targetKind = 'fire';
        log('Fireball: click a lit tile. (Anywhere else cancels)', '#ffb04f');
      }
      else if (kind.indexOf('ring_') === 0){ ui.mode='play'; equipRing(kind); }
      return;
    }
  }
}
function shopClick(mx,my){
  var L = shopLayout();
  if (hit(L.close,mx,my) || !hit(L.panel,mx,my)){ ui.mode = 'play'; log('"Safe travels."', '#7fd4ff'); return; }
  for (var i=0; i<L.rows.length; i++){
    if (hit(L.rows[i].rect,mx,my)){
      if (L.rows[i].type === 'ware') buyWare(L.rows[i].i);
      else if (L.rows[i].type === 'service') buyService(L.rows[i].service);
      else sellPackGear(L.rows[i].i);
      return;
    }
  }
}
function targetClick(mx,my){
  var t = tileFromPixel(mx,my);
  if (t && S.vis[idx(t[0],t[1])] && my <= H-HUD_H){
    if (ui.targetKind === 'acid') throwAcid(t[0],t[1]);
    else castFireball(t[0],t[1]);
  } else {
    ui.mode = 'play'; ui.targetKind = null;
    log('You lower your arm.', '#7d8ea3');
  }
}

// Optional keyboard bonus
window.addEventListener('keydown', function(e){

// ---------- Rendering ----------
function px(x){ return offX + x*tile; }
function py2(y){ return offY + y*tile; }
function drawGlyph(g, x, y, color, alpha, scale){
  ctx.globalAlpha = alpha;
  ctx.fillStyle = color;
  ctx.font = Math.floor(tile*(scale||0.78))+'px Menlo, Consolas, monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(g, px(x)+tile/2, py2(y)+tile/2+1);
  ctx.globalAlpha = 1;
}

function drawMap(){
  var mapH = H-HUD_H;
  if(COLS*tile>W) offX=Math.max(W-COLS*tile,Math.min(0,Math.round(W/2-(S.px+.5)*tile)));
  if(ROWS*tile>mapH) offY=Math.max(mapH-ROWS*tile,Math.min(0,Math.round(mapH/2-(S.py+.5)*tile)));
  var map = S.map, seen = S.seen, vis = S.vis;
  for (var y=0; y<ROWS; y++){
    for (var x=0; x<COLS; x++){
      var ii = idx(x,y);
      if (!seen[ii]) continue;
      var lit = vis[ii] === 1;
      var th = S.theme || THEMES[0];
      ctx.fillStyle = lit ? (map[ii]===1 ? th.floorBg : th.wallBg) : '#0a0d13';
      ctx.fillRect(px(x), py2(y), tile, tile);
      if (map[ii] === 0) drawGlyph('#', x, y, th.wall, lit?0.95:0.35);
      else drawGlyph('·', x, y, th.dot, lit?0.8:0.3);
    }
  }
  if (S.stairs && seen[idx(S.stairs.x, S.stairs.y)]){
    var sl = vis[idx(S.stairs.x,S.stairs.y)]===1;
    drawGlyph('>', S.stairs.x, S.stairs.y, '#f5f2e8', sl?1:0.4, 0.85);
  }
  for (var t=0; t<S.traps.length; t++){
    var tr = S.traps[t];
    if (!tr.revealed || !seen[idx(tr.x,tr.y)]) continue;
    var tl = vis[idx(tr.x,tr.y)]===1;
    drawGlyph('^', tr.x, tr.y, tr.sprung ? '#5a6578' : (tr.type==='spike'?'#e05050':'#7ee787'), tl?0.95:0.4, 0.7);
  }
}
function drawItems(now){
  for (var i=0; i<S.items.length; i++){
    var it = S.items[i];
    var ii = idx(it.x,it.y);
    if (!S.seen[ii]) continue;
    var lit = S.vis[ii]===1;
    var g='?', c='#fff', sc=0.78;

function tooltipLines(tx,ty){
  var ii = idx(tx,ty);
  if (!S.seen[ii]) return null;
  var lines = [];
  var m = S.vis[ii]===1 ? monsterAt(tx,ty) : null;
  if (m){
    lines.push([(m.isBoss||m.isMini?'★ ':'')+(m.champ&&!m.isMini?'✦ ':'')+m.name, m.color]);
    lines.push([m.hp+'/'+m.maxHp+' HP   Atk '+m.atk+'  Def '+m.def+'   '+m.xp+' xp', '#c9d4e0']);
    var notes = [];
    if (m.slow) notes.push('slow');
    if (m.poison) notes.push('poisonous');
    if (m.burn) notes.push('casts fire');
    else if (m.ai==='ranged') notes.push('ranged');
    if (m.ai==='phase') notes.push('walks through walls');
    if (m.isBoss) notes.push('guards the Amulet');
    if (m.isMini) notes.push('guards the stairs');
    if (m.champ && !m.isMini) notes.push('champion: better loot');
    if (notes.length) lines.push([notes.join(', '), '#8b9bb0']);
    if (S.cls==='ranger' && rangerCanShoot(m)) lines.push(['In bow range — click to shoot', '#7ec850']);
    return lines;
  }
  if (keeperAt(tx,ty)){
    lines.push(['Shopkeeper', '#5fd7d7']);
    lines.push(['Step beside and click to trade', '#8b9bb0']);
    return lines;
  }
  var it = itemAt(tx,ty);
  if (it){
    if (it.type==='gold'){ lines.push(['Gold — '+it.amt+' pieces', '#ffd700']); }
    else if (it.type==='gear'){
      lines.push([it.gear.name, RARITY_COLOR[it.gear.rarity]]);
      lines.push([gearStatText(it.gear), '#8b9bb0']);
      if (it.gear.slot==='weapon' && it.gear.wtype !== CLASSES[S.cls].prof)
        lines.push(['off-class weapon — reduced effect', '#f0b46a']);
    }
    else if (it.type==='chest'){ lines.push(['Chest', '#d8a848']); lines.push(['Walk onto it to open', '#8b9bb0']); }
    else if (it.type==='altar'){ lines.push(['Blood Altar', '#c9a0ff']); lines.push(['Step on it... if you dare', '#8b9bb0']); }
    else if (it.type==='amulet'){ lines.push(['The Amulet of Yendor', '#c9a0ff']); lines.push(['Claim it to win', '#8b9bb0']); }
    else if (KIND_INFO[it.type]){ lines.push([KIND_INFO[it.type].name, KIND_INFO[it.type].color]); lines.push([kindDesc(it.type), '#8b9bb0']); }
    if (lines.length) return lines;
  }
  var tr = trapAt(tx,ty);
  if (tr && tr.revealed){
    lines.push([(tr.type==='spike'?'Spike trap':'Poison dart trap')+(tr.sprung?' (sprung)':''), tr.sprung?'#5a6578':'#e05050']);
    if (!tr.sprung) lines.push(['Click it directly to step on it', '#8b9bb0']);
    return lines;
  }
  if (S.stairs && tx===S.stairs.x && ty===S.stairs.y){
    lines.push(['Stairs down', '#f5f2e8']);
    lines.push(['Stand here, then click yourself', '#8b9bb0']);
    return lines;
  }
  return null;
}
function drawTooltip(lines){
  if (!lines || mouseX < 0) return;
  ctx.font = '12px Menlo, Consolas, monospace';
  var wMax = 0;
  for (var i=0; i<lines.length; i++)
    wMax = Math.max(wMax, ctx.measureText(lines[i][0]).width);
  var bw = wMax + 16, bh = lines.length*17 + 9;
  var bx = Math.min(W-bw-4, mouseX+14), by = Math.max(4, mouseY-10-bh);
  ctx.fillStyle = 'rgba(10,14,20,0.94)';
  ctx.strokeStyle = '#3a4664';
  ctx.lineWidth = 1;
  ctx.fillRect(bx, by, bw, bh);
  ctx.strokeRect(bx+0.5, by+0.5, bw, bh);
  ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  for (i=0; i<lines.length; i++){
    ctx.fillStyle = lines[i][1];
    ctx.fillText(lines[i][0], bx+8, by+13+i*17);
  }
}
function drawHover(){
  if (screen !== 'game') return;
  if (ui.mode === 'inventory' || ui.mode === 'shop' || ui.mode === 'levelup' || ui.mode === 'event') return;

  if (ui.mode === 'target'){
    var acid = ui.targetKind === 'acid';
    ctx.font = 'bold 14px Menlo, Consolas, monospace';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    var msg = acid ? 'ACID FLASK — click a lit tile' : 'FIREBALL — click a lit tile';
    var mw = ctx.measureText(msg).width + 28;
    ctx.fillStyle = acid ? 'rgba(10,20,6,0.9)' : 'rgba(20,12,4,0.9)';
    ctx.fillRect(W/2-mw/2, 10, mw, 28);
    ctx.strokeStyle = acid ? '#9be05a' : '#ffb04f'; ctx.lineWidth = 1;
    ctx.strokeRect(W/2-mw/2+0.5, 10.5, mw, 28);
    ctx.fillStyle = acid ? '#9be05a' : '#ffb04f';
    ctx.fillText(msg, W/2, 25);
    var rad = acid ? 1 : 2;
    if (hoverTX >= 0 && S.vis[idx(hoverTX,hoverTY)]){
      for (var dy=-rad; dy<=rad; dy++)
        for (var dx=-rad; dx<=rad; dx++){
          var x = hoverTX+dx, y = hoverTY+dy;
          if (!inB(x,y) || !S.vis[idx(x,y)]) continue;
          ctx.fillStyle = acid ? 'rgba(120,220,60,0.25)' : 'rgba(255,140,60,0.25)';
          ctx.fillRect(px(x), py2(y), tile, tile);
        }
      ctx.strokeStyle = acid ? 'rgba(155,224,90,0.95)' : 'rgba(255,176,79,0.95)';
      ctx.lineWidth = 2;
      ctx.strokeRect(px(hoverTX)+1, py2(hoverTY)+1, tile-2, tile-2);
    }
    return;
  }

  if (walkQueue.length){
    ctx.fillStyle = 'rgba(232,217,160,0.28)';
    for (var i=0; i<walkQueue.length; i++){
      var c = walkQueue[i];
      ctx.beginPath();
      ctx.arc(px(c[0])+tile/2, py2(c[1])+tile/2, Math.max(2,tile*0.12), 0, Math.PI*2);
      ctx.fill();
    }
    return;
  }
  if (hoverTX < 0) return;
  var ii = idx(hoverTX, hoverTY);
  if (!S.seen[ii]) return;
  var m = S.vis[ii] ? monsterAt(hoverTX, hoverTY) : null;
  var bowable = m && rangerCanShoot(m);

  if (hoverPath && !bowable){
    ctx.fillStyle = m ? 'rgba(255,120,120,0.3)' : 'rgba(232,217,160,0.3)';
    for (var j=0; j<hoverPath.length; j++){
      var p = hoverPath[j];
      ctx.beginPath();
      ctx.arc(px(p[0])+tile/2, py2(p[1])+tile/2, Math.max(2,tile*0.12), 0, Math.PI*2);
      ctx.fill();
    }
  }
  if (bowable){
    ctx.strokeStyle = 'rgba(126,200,80,0.55)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(px(S.px)+tile/2, py2(S.py)+tile/2);
    ctx.lineTo(px(m.x)+tile/2, py2(m.y)+tile/2);
    ctx.stroke();
  }
  ctx.lineWidth = 2;
  ctx.strokeStyle = m ? (bowable ? 'rgba(126,200,80,0.95)' : 'rgba(255,110,110,0.9)') :
    (keeperAt(hoverTX,hoverTY) ? 'rgba(95,215,215,0.9)' :
    (S.map[ii]===1 ? 'rgba(232,217,160,0.85)' : 'rgba(120,130,150,0.4)'));
  ctx.strokeRect(px(hoverTX)+1, py2(hoverTY)+1, tile-2, tile-2);

  drawTooltip(tooltipLines(hoverTX,hoverTY));
}
function drawEffects(now){
  for (var i=projectiles.length-1; i>=0; i--){
    var pr = projectiles[i];
    var t = (now - pr.t0)/pr.dur;
    if (t >= 1){ projectiles.splice(i,1); continue; }
    var x = pr.x0 + (pr.x1-pr.x0)*t, y = pr.y0 + (pr.y1-pr.y0)*t;
    ctx.globalAlpha = 0.95;
    ctx.fillStyle = pr.color;
    ctx.font = Math.floor(tile*0.7)+'px Menlo, Consolas, monospace';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(pr.glyph, offX+x*tile+tile/2, offY+y*tile+tile/2);
    ctx.globalAlpha = 1;
  }
  for (i=booms.length-1; i>=0; i--){
    var b = booms[i];
    var bt = (now - b.t0)/420;
    if (bt >= 1){ booms.splice(i,1); continue; }
    ctx.globalAlpha = (1-bt)*0.7;
    ctx.strokeStyle = '#ffb04f';
    ctx.lineWidth = 3*(1-bt)+1;
    ctx.beginPath();
    ctx.arc(px(b.x)+tile/2, py2(b.y)+tile/2, bt*tile*2.4+2, 0, Math.PI*2);
    ctx.stroke();
    ctx.globalAlpha = 1;
  }
  for (i=floaters.length-1; i>=0; i--){
    var f = floaters[i];
    var ft = (now - f.t0)/900;
    if (ft >= 1){ floaters.splice(i,1); continue; }
    ctx.globalAlpha = 1 - ft*ft;
    ctx.fillStyle = f.color;
    ctx.font = 'bold '+Math.max(11, Math.floor(tile*0.7))+'px Menlo, Consolas, monospace';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(f.text, px(f.x)+tile/2, py2(f.y) - ft*22);
    ctx.globalAlpha = 1;
  }
}

function drawMinimap(){

  var s = 4;
