  var mx0 = W - mw - 12, my0 = 54;   // below the fixed nav buttons
  ctx.fillStyle = 'rgba(5,7,10,0.85)';
  ctx.fillRect(mx0-3, my0-3, mw+6, mh+6);
  ctx.strokeStyle = '#232c3d'; ctx.lineWidth = 1;
  ctx.strokeRect(mx0-2.5, my0-2.5, mw+5, mh+5);
  for (var y=0; y<ROWS; y++)
    for (var x=0; x<COLS; x++){
      var ii = idx(x,y);
      if (!S.seen[ii]) continue;
      if (S.map[ii]===1) ctx.fillStyle = S.vis[ii] ? '#2c3850' : '#181f2e';
      else ctx.fillStyle = S.vis[ii] ? '#39456a' : '#20273a';
      ctx.fillRect(mx0+x*s, my0+y*s, s, s);

  if (S.stairs && S.seen[idx(S.stairs.x,S.stairs.y)]){
    ctx.fillStyle = '#f5f2e8';
    ctx.fillRect(mx0+S.stairs.x*s, my0+S.stairs.y*s, s, s);
  }
  if (S.keeper && S.seen[idx(S.keeper.x,S.keeper.y)]){
    ctx.fillStyle = '#5fd7d7';
    ctx.fillRect(mx0+S.keeper.x*s, my0+S.keeper.y*s, s, s);
  }
  for (var i=0; i<S.items.length; i++){
    var it = S.items[i];
    if (it.type==='amulet' && S.seen[idx(it.x,it.y)]){
      ctx.fillStyle = '#c9a0ff';
      ctx.fillRect(mx0+it.x*s, my0+it.y*s, s, s);
    }
  }
  for (i=0; i<S.monsters.length; i++){

    if (S.vis[idx(m.x,m.y)]){
      ctx.fillStyle = m.isBoss||m.isMini ? '#ff4f6e' : '#e05050';

}
function drawInventory(){
  var L = invLayout(), p = L.panel;

                    (canSellHere() ? 'Inventory — trading' : 'Inventory'));

  ctx.textAlign='left'; ctx.textBaseline='middle';
  ctx.fillStyle = '#7d8ea3';
  ctx.fillText('Atk '+pAtk()+'   Def '+pDef()+'   Regen '+regenPower()+'   Pack '+S.pack.length+'/10', p.x+14, p.y+42);

  var SLOT_LABEL = { weapon:'Weapon', armor:'Armor', helm:'Helm', boots:'Boots' };
  for (var i=0; i<L.rows.length; i++){
    var row = L.rows[i], rr = row.rect;
    var hov = hit(rr, mouseX, mouseY);

      var g = S.equip[row.slot];
      drawRow(rr, hov, g?gearColor(g):'#333c4d');

        ctx.font = '10px Menlo, Consolas, monospace';
        ctx.textAlign='right';
        ctx.fillStyle = '#7d8ea3';
        ctx.fillText(gearStatText(g)+(S.transmuting?'':'   ✕'), rr.x+rr.w-8, rr.y+rr.h/2+1);
      }
    } else if (row.type === 'ring'){
      var kind = S.rings[row.ringSlot];
      drawRow(rr, hov, kind?KIND_INFO[kind].color:'#333c4d');
      ctx.font = 'bold 11px Menlo, Consolas, monospace';
      ctx.textAlign='left';
      ctx.fillStyle = '#66788f';
      ctx.fillText('Ring '+(row.ringSlot+1), rr.x+8, rr.y+rr.h/2+1);
      ctx.fillStyle = kind ? KIND_INFO[kind].color : '#4a5568';
      ctx.fillText(kind ? KIND_INFO[kind].name : '— empty —', rr.x+68, rr.y+rr.h/2+1);
      if (kind){
        ctx.font = '10px Menlo, Consolas, monospace';
        ctx.textAlign='right';
        ctx.fillStyle = '#7d8ea3';
        ctx.fillText(kindDesc(kind)+(S.transmuting?'':'   ✕'), rr.x+rr.w-8, rr.y+rr.h/2+1);
      }
    } else if (row.type === 'pack'){
      var pg = S.pack[row.i];
      if (!pg) continue;
      drawRow(rr, hov, gearColor(pg));
      var SLOT_BADGE = { weapon:'WPN', armor:'ARM', helm:'HLM', boots:'BTS' };
      ctx.font = 'bold 9px Menlo, Consolas, monospace';
      ctx.textAlign='left';
      ctx.fillStyle = '#66788f';
      ctx.fillText('['+SLOT_BADGE[pg.slot]+']', rr.x+6, rr.y+rr.h/2+1);
      ctx.font = 'bold 11px Menlo, Consolas, monospace';
      ctx.fillStyle = gearColor(pg);
      ctx.fillText(gearGlyph(pg.slot, pg.wtype)+' '+pg.name, rr.x+40, rr.y+rr.h/2+1);
      ctx.font = '10px Menlo, Consolas, monospace';
      ctx.textAlign='right';
      if (canSellHere() && !S.transmuting){
        ctx.fillStyle = '#ffd700';
        ctx.fillText('Sell '+sellPrice(gearValue(pg))+'g', rr.x+rr.w-8, rr.y+rr.h/2+1);
        ctx.fillStyle = '#7d8ea3';
        ctx.fillText(gearStatText(pg)+'  Equip', rr.x+rr.w-72, rr.y+rr.h/2+1);
      } else {
        ctx.fillStyle = '#7d8ea3';
        ctx.fillText(gearStatText(pg)+'  '+(S.transmuting?'Reroll':'Equip'), rr.x+rr.w-8, rr.y+rr.h/2+1);
      }
      if (hov && !S.transmuting) hoverPack = pg;
    } else if (row.type === 'use'){
      var info = KIND_INFO[row.kind];
      drawRow(rr, hov, info.color);
      ctx.font = 'bold 11px Menlo, Consolas, monospace';
      ctx.textAlign='left';
      ctx.fillStyle = info.color;
      ctx.fillText(info.glyph+' '+info.name+(invCount(row.kind)>1?' ×'+invCount(row.kind):''), rr.x+8, rr.y+rr.h/2+1);
      ctx.font = '10px Menlo, Consolas, monospace';
      ctx.textAlign='right';
      if (canSellHere() && !S.transmuting){
        ctx.fillStyle = '#ffd700';
        ctx.fillText('Sell '+sellPrice(KIND_VALUE[row.kind]||10)+'g', rr.x+rr.w-8, rr.y+rr.h/2+1);
        ctx.fillStyle = '#7d8ea3';
        ctx.fillText(kindDesc(row.kind)+'  '+info.verb, rr.x+rr.w-72, rr.y+rr.h/2+1);
      } else {
        ctx.fillStyle = '#7d8ea3';
        ctx.fillText(kindDesc(row.kind)+'  '+(S.transmuting?'Reroll':info.verb), rr.x+rr.w-8, rr.y+rr.h/2+1);
      }
    }
  }
  // hover comparison vs the equipped piece in that slot
  if (hoverPack){
    var eq = S.equip[hoverPack.slot];
    var a = gearEffStats(hoverPack), b = gearEffStats(eq);
    var lines = [[hoverPack.name+'  vs  '+(eq?eq.name:'(empty)'), gearColor(hoverPack)]];
    var KEYS = [['atk','Atk'],['def','Def'],['hp','HP'],['regen','Regen']];
    for (var kk=0; kk<KEYS.length; kk++){
      var k2 = KEYS[kk][0];
      var d = a[k2]-b[k2];
      if (!d && !a[k2] && !b[k2]) continue;
      lines.push([KEYS[kk][1]+'  '+a[k2]+'  ('+(d>0?'▲ +':(d<0?'▼ ':'='))+(d!==0?d:'')+')',
                  d>0 ? '#7ee787' : (d<0 ? '#ff8a8a' : '#8b9bb0')]);
    }
    if (hoverPack.slot==='weapon' && hoverPack.wtype !== CLASSES[S.cls].prof)
      lines.push(['off-class weapon — reduced effect', '#f0b46a']);
    drawTooltip(lines);
  }
}
function drawShop(){
  var L = shopLayout(), p = L.panel;
  drawPanelFrame(p, 'Shop — Depth '+S.depth);
  drawClose(L.close);
  ctx.font = '12px Menlo, Consolas, monospace';
  ctx.textAlign='left'; ctx.textBaseline='middle';
  ctx.fillStyle = '#ffd700';
  ctx.fillText('Your gold: '+S.gold, p.x+14, p.y+50);
  ctx.fillStyle = '#7d8ea3';
  ctx.fillText('Click a ware to buy it', p.x+14, p.y+68);

  var wares = S.shopWares || [];
  if (!L.rows.length){
    ctx.fillStyle = '#5a6578';
    ctx.fillText('"All sold out, friend."', p.x+14, p.y+100);
  }
  var drewSellHeader = false;
  for (var i=0; i<L.rows.length; i++){
    var row = L.rows[i], rr = row.rect;
    var name, color, desc, price;
    if (row.type === 'ware'){
      var w = wares[row.i];
      if (!w) continue;
      price = w.price;
      if (w.kind==='gear'){ name = w.gear.name; color = RARITY_COLOR[w.gear.rarity]; desc = gearStatText(w.gear); }
      else if (w.kind==='crate'){ name = 'Mystery Crate'; color = '#d8a848'; desc = 'Sealed. Could be anything.'; }
      else { name = KIND_INFO[w.kind].name; color = KIND_INFO[w.kind].color; desc = kindDesc(w.kind); }
    } else if (row.type === 'service'){
      price = row.service.price;
      name = row.service.name; color = row.service.service==='respec' ? '#c9a0ff' : '#ff5c5c';
      desc = row.service.service==='respec' ? 'Forget all skills, refund the points' : 'Lift the curse from this item';
    } else {
      // sell row
      var sg = S.pack[row.i];
      if (!sg) continue;
      if (!drewSellHeader){
        drewSellHeader = true;
        ctx.font = 'bold 11px Menlo, Consolas, monospace';
        ctx.textAlign='left'; ctx.fillStyle = '#7d8ea3';
        ctx.fillText('— Sell from your pack —', p.x+14, L.sellY);
      }
      var hovS = hit(rr, mouseX, mouseY);
      drawRow(rr, hovS, '#ffd700');
      ctx.font = 'bold 11px Menlo, Consolas, monospace';
      ctx.textAlign='left';
      ctx.fillStyle = gearColor(sg);
      ctx.fillText(gearGlyph(sg.slot, sg.wtype)+' '+sg.name, rr.x+8, rr.y+rr.h/2+1);
      ctx.font = 'bold 11px Menlo, Consolas, monospace';
      ctx.textAlign='right';
      ctx.fillStyle = '#ffd700';
      ctx.fillText('+'+sellPrice(gearValue(sg))+' g', rr.x+rr.w-8, rr.y+rr.h/2+1);
      continue;
    }
    var afford = S.gold >= price;
    var hov = hit(rr, mouseX, mouseY);
    drawRow(rr, hov && afford, color);
    ctx.font = 'bold 13px Menlo, Consolas, monospace';
    ctx.textAlign='left';
    ctx.fillStyle = afford ? color : '#5a6578';
    ctx.fillText(name, rr.x+10, rr.y+11);
    ctx.font = '10px Menlo, Consolas, monospace';
    ctx.fillStyle = '#7d8ea3';
    ctx.fillText(desc, rr.x+10, rr.y+24);
    ctx.font = 'bold 12px Menlo, Consolas, monospace';
    ctx.textAlign='right';
    ctx.fillStyle = afford ? '#ffd700' : '#8a5a5a';
    ctx.fillText(price+' g', rr.x+rr.w-10, rr.y+rr.h/2+1);
  }
}
function drawLevelUp(){
  var L = levelLayout(), p = L.panel;
  ctx.fillStyle = 'rgba(5,7,10,0.6)';
  ctx.fillRect(0,0,W,H);
  drawPanelFrame(p, CLASSES[S.cls].name+' Skills — '+S.skillPts+' point'+(S.skillPts===1?'':'s'));
  drawClose(L.close);
  ctx.font = '11px Menlo, Consolas, monospace';
  ctx.textAlign='left'; ctx.textBaseline='middle';
  ctx.fillStyle = '#7d8ea3';
  ctx.fillText('Each level grants a point. Lower skills unlock the branch above them.', p.x+14, p.y+44);

  // branch headers + connector lines
  var names = BRANCH_NAMES[S.cls];
  var byBr = [[],[],[]];
  for (var i=0; i<L.rows.length; i++) byBr[L.rows[i].br][L.rows[i].tier] = L.rows[i];
  ctx.font = 'bold 12px Menlo, Consolas, monospace';
  ctx.textAlign='center';
  for (var b=0; b<3; b++){
    var col = byBr[b];

    ctx.fillStyle = CLASSES[S.cls].color;
    ctx.fillText(names[b], col[0].rect.x+col[0].rect.w/2, p.y+92);
    ctx.strokeStyle = '#2a3550'; ctx.lineWidth = 2;
    for (var tr=0; tr<2; tr++){
      if (!col[tr] || !col[tr+1]) continue;
      ctx.beginPath();
      ctx.moveTo(col[tr].rect.x+col[tr].rect.w/2, col[tr].rect.y+col[tr].rect.h);
      ctx.lineTo(col[tr+1].rect.x+col[tr+1].rect.w/2, col[tr+1].rect.y);
      ctx.stroke();
    }
  }
  var list = SKILLS[S.cls];
  for (i=0; i<L.rows.length; i++){
    var row = L.rows[i], rr = row.rect, n = list[row.i];
    var hov = hit(rr, mouseX, mouseY);
    var border = row.taken ? '#7ee787' : (row.avail ? '#ffd75f' : '#333c4d');
    ctx.fillStyle = row.taken ? '#132318' : (hov && row.avail ? '#22304a' : '#141b28');
    ctx.fillRect(rr.x, rr.y, rr.w, rr.h);
    ctx.strokeStyle = (hov && row.avail) ? '#ffd75f' : border;
    ctx.lineWidth = row.taken || row.avail ? 2 : 1;
    ctx.strokeRect(rr.x+0.5, rr.y+0.5, rr.w, rr.h);
    ctx.font = 'bold 12px Menlo, Consolas, monospace';
    ctx.textAlign='left';
    ctx.fillStyle = row.taken ? '#7ee787' : (row.avail ? '#ffd75f' : '#5a6578');
    ctx.fillText((row.taken?'✓ ':'')+n.name, rr.x+8, rr.y+15);
    ctx.font = '10px Menlo, Consolas, monospace';
    ctx.fillStyle = row.taken || row.avail ? '#9fb0c3' : '#4a5568';
    ctx.fillText(n.desc, rr.x+8, rr.y+32);
    if (!row.taken && !row.avail && n.tier>0){
      ctx.fillStyle = '#4a5568';
      ctx.fillText(S.skillPts>0 ? 'locked — needs branch' : 'no points', rr.x+8, rr.y+46);
    } else if (row.avail){
      ctx.fillStyle = '#ffd75f';
      ctx.fillText('click to learn', rr.x+8, rr.y+46);
    }
  }
}

var TITLE_GLYPHS = ['#','·','%','/',']','$','>','r','g','o','T','?','=','^','&','"','!','['];

function drawTitle(now){

    ctx.fillStyle = cd.color;
    ctx.font = 'bold 24px Menlo, Consolas, monospace';
    ctx.textAlign = 'center';
    ctx.fillText('@', r.x+r.w/2, ry+30);
    ctx.font = 'bold 15px Menlo, Consolas, monospace';
    ctx.fillText(cd.name, r.x+r.w/2, ry+56);
    ctx.font = '11px Menlo, Consolas, monospace';
    ctx.fillStyle = '#9fb0c3';
    for (var l=0; l<(W<640?2:cd.lines.length); l++)
      ctx.fillText(cd.lines[l], r.x+r.w/2, ry+82+l*16);
    ctx.fillStyle = '#66788f';
    ctx.fillText('HP '+ (cd.hp + (hasPerk('vital')?5:0)) +'  Atk '+cd.atkBase, r.x+r.w/2, ry+r.h-14);
    if (cd.diff){
      var dc = cd.diff === 'EASY' ? '#7ec850' : cd.diff === 'MEDIUM' ? '#f5c453' : '#ff5c5c';
      ctx.font = 'bold 10px Menlo, Consolas, monospace';
      ctx.fillStyle = dc;
      ctx.fillText('◆ ' + cd.diff, r.x+r.w/2, ry+70);

  var sb = TL.shrine;

  ctx.font = 'bold 12px Menlo, Consolas, monospace';

  ctx.fillStyle = '#5a6578';

  if (titleShrine) drawShrine();

function drawEnd(){

  ctx.fillRect(0,0,W,H);

    ctx.fillStyle = '#9fb0c3';
    ctx.font = '13px Menlo, Consolas, monospace';

  ctx.fillText(CLASSES[S.cls].name+' — level '+S.level, W/2, p.y+116);

  ctx.fillStyle = '#c9a0ff';
  ctx.font = 'bold 13px Menlo, Consolas, monospace';
  ctx.fillText('+'+S.soulsEarned+' souls banked  (total '+loadSouls()+')', W/2, p.y+172);

  var best = loadBest(), wins = loadWins();

    ctx.fillStyle = '#ffd75f';

  } else {
    ctx.fillStyle = (best === S.depth && best > 0) ? '#e8d9a0' : '#5a6578';

  var b = L.newRun;

  ctx.fillStyle = hovNR ? '#26314a' : '#1a2233';
  ctx.fillRect(b.x, b.y, b.w, b.h);
  ctx.strokeStyle = '#e8d9a0'; ctx.lineWidth = 2;
  ctx.strokeRect(b.x, b.y, b.w, b.h);
  ctx.fillStyle = '#e8d9a0';
  ctx.font = 'bold 15px Menlo, Consolas, monospace';
  ctx.fillText('New Run', b.x+b.w/2, b.y+b.h/2+1);

}

function openMenu(){
  if (screen !== 'game') return;
  menuOpen = true;
  stopWalk();
  newRunArmed = false;
  mNewRun.textContent = 'Restart run';
  mNewRun.classList.remove('confirm');
  menuOverlay.hidden = false;
}
function closeMenu(){
  menuOpen = false;
  menuOverlay.hidden = true;
}
menuBtn.addEventListener('click', function(){
  if (menuOpen) closeMenu(); else openMenu();
});
mResume.addEventListener('click', closeMenu);
mHelp.addEventListener('click', function(){ closeMenu(); document.getElementById('tutorial').hidden=false; });
document.getElementById('tutorialOk').addEventListener('click', function(){
  lsSet('depths_tutorial_seen_v1',1);document.getElementById('tutorial').hidden=true;
});
mNewRun.addEventListener('click', function(){
  if (!newRunArmed){
    newRunArmed = true;
    mNewRun.textContent = 'Abandon run — sure?';
    mNewRun.classList.add('confirm');
    return;
  }
  var cls = S ? S.cls : 'warrior';
  closeMenu();
  newRun(cls);   // restart immediately with the same class
});
var lastMenuBtnShown = null;
function syncNav(){
  var show = (screen === 'game');
  if (show !== lastMenuBtnShown){
    menuBtn.style.display = show ? 'flex' : 'none';
    lastMenuBtnShown = show;
  }
  if (!show && menuOpen) closeMenu();
}

// ---------- Cursor affordance for canvas hot-regions ----------
function clickableAt(mx,my){
  if (menuOpen) return false;
  var i;
  if (screen === 'title'){
    if (titleShrine){
      var SL = shrineLayout();
      if (hit(SL.close,mx,my)) return true;
      for (i=0; i<SL.rows.length; i++) if (hit(SL.rows[i].rect,mx,my)) return true;
      return false;
    }
    var TL = titleLayout();
    if (hit(TL.shrine,mx,my)) return true;
    for (i=0; i<TL.cards.length; i++) if (hit(TL.cards[i].rect,mx,my)) return true;
    return false;
  }
  if (screen === 'dead' || screen === 'win'){
    return hit(endLayout().newRun,mx,my);
  }
  if (!S) return false;
  if (ui.mode === 'levelup'){
    var LL = levelLayout();
    if (hit(LL.close,mx,my)) return true;
    for (i=0; i<LL.rows.length; i++) if (hit(LL.rows[i].rect,mx,my)) return true;
    return false;
  }
  if (ui.mode === 'event'){
    var EV = eventLayout();
    for (i=0; i<EV.rows.length; i++) if (hit(EV.rows[i].rect,mx,my)) return true;
    return false;
  }
  if (ui.mode === 'inventory'){
    var IL = invLayout();
    if (hit(IL.close,mx,my)) return true;
    for (i=0; i<IL.rows.length; i++) if (hit(IL.rows[i].rect,mx,my)) return true;
    return false;
  }
  if (ui.mode === 'shop'){
    var SH = shopLayout();
    if (hit(SH.close,mx,my)) return true;
    for (i=0; i<SH.rows.length; i++) if (hit(SH.rows[i].rect,mx,my)) return true;
    return false;
  }
  if (ui.mode === 'target'){
    var tt = tileFromPixel(mx,my);
    return !!(tt && S.vis[idx(tt[0],tt[1])] && my <= H-HUD_H);
  }
  var hud = hudLayout();
  if (hit(hud.potion,mx,my) || hit(hud.ability,mx,my) || hit(hud.inv,mx,my) ||
      hit(hud.map,mx,my) || hit(hud.level,mx,my) || (hud.flask && hit(hud.flask,mx,my))) return true;
  if (my > H-HUD_H) return false;
  var t = tileFromPixel(mx,my);
  if (!t) return false;
  var tx = t[0], ty = t[1], ii = idx(tx,ty);
  if (!S.seen[ii]) return false;
  if (tx===S.px && ty===S.py) return true;
  var m = S.vis[ii] ? monsterAt(tx,ty) : null;
  if (m || keeperAt(tx,ty)) return true;
  if (S.map[ii]===1 && hoverPath) return true;   // main listener already pathed this tile
  return false;
}
canvas.addEventListener('mousemove', function(e){
  canvas.style.cursor = clickableAt(e.clientX, e.clientY) ? 'pointer' : 'default';
});

// ---------- Debug handle (read-only; used for automated testing) ----------
window.__D = {
  get S(){ return S; },
  get screen(){ return screen; },
  get uiMode(){ return ui.mode; },
  get targetKind(){ return ui.targetKind; },
  get titleShrine(){ return titleShrine; },
  get tile(){ return tile; },
  get offX(){ return offX; },
  get offY(){ return offY; },
  get walking(){ return walkQueue.length > 0 || !!walkAttack; },
  get hud(){ return hudLayout(); },
  get invL(){ return invLayout(); },
  get shopL(){ return S && S.shopWares ? shopLayout() : null; },
  get levelL(){ return levelLayout(); },
  get endL(){ return endLayout(); },
  get titleL(){ return titleLayout(); },
  get shrineL(){ return shrineLayout(); },
  get minimap(){ return minimapOn; },
  get souls(){ return loadSouls(); },
  get perks(){ return loadPerks(); },
  get menuOpen(){ return menuOpen; },
  get eventL(){ return eventLayout(); },
  get muted(){ return muted; },
  get canSell(){ return S ? canSellHere() : false; },
  step: function(){ if (screen === 'game') walkTick(performance.now()); }
};
window.render_game_to_text = function(){
  return JSON.stringify(S ? {game:'Depths',screen:screen,mode:ui.mode,depth:S.depth,hero:{x:S.px,y:S.py,hp:S.hp,maxHp:S.maxHp,level:S.level},gold:S.gold,kills:S.kills,inventory:S.pack.length} : {game:'Depths',screen:screen});
};

// ---------- Main loop ----------
function frame(now){
  layoutFresh();
  syncNav();
  ctx.fillStyle = '#05070a';
  ctx.fillRect(0,0,W,H);

  if (screen === 'title'){
    drawTitle(now);
  } else {
    if (screen === 'game') walkTick(now);
    var shaking = now - shakeT0 < 240;
    if (shaking){
      var k = (1 - (now-shakeT0)/240) * shakeMag;
      ctx.save();
      ctx.translate((Math.random()-0.5)*k, (Math.random()-0.5)*k);
    }
    drawMap();
    drawItems(now);
    drawKeeper();
    drawMonsters(now);
    drawPlayer(now);
    drawHover();
    drawEffects(now);
    if (shaking) ctx.restore();
    drawBossBar();
    drawMinimap();
    if (ui.mode === 'inventory') drawInventory();
    if (ui.mode === 'shop') drawShop();
    if (ui.mode === 'levelup') drawLevelUp();
    if (ui.mode === 'event') drawEvent();
    drawHUD();
    if (screen === 'dead' || screen === 'win') drawEnd();
  }
  // quick fade-in on screen transitions
  var ft = (now - fadeT0)/260;
  if (ft >= 0 && ft < 1){
    ctx.globalAlpha = 1 - ft;
    ctx.fillStyle = '#05070a';
    ctx.fillRect(0,0,W,H);
    ctx.globalAlpha = 1;
  }
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

})();
</script>
