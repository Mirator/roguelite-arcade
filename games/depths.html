  var TL = titleLayout(), p = TL.panel;
  ctx.fillStyle = 'rgba(8,11,17,0.94)';
  ctx.fillRect(p.x, p.y, p.w, p.h);
  ctx.strokeStyle = '#3a4664'; ctx.lineWidth = 2;
  ctx.strokeRect(p.x, p.y, p.w, p.h);

  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillStyle = '#ffd75f';
  ctx.font = 'bold 40px Menlo, Consolas, monospace';
  ctx.fillText('DEPTHS', W/2, p.y+46);
  ctx.fillStyle = '#7d8ea3';
  ctx.font = '13px Menlo, Consolas, monospace';
  ctx.fillText('claim the Amulet of Yendor on depth 10', W/2, p.y+78);

  ctx.fillStyle = '#c9d4e0';
  ctx.font = '12px Menlo, Consolas, monospace';
  ctx.fillText('Hover previews a path · click to walk · click monsters to fight', W/2, p.y+104);

  ctx.globalAlpha = 0.65 + 0.35*Math.sin(now/350);
  ctx.fillStyle = '#e8d9a0';
  ctx.font = 'bold 14px Menlo, Consolas, monospace';
  ctx.fillText('— Click a class to start —', W/2, p.y+126);
  ctx.globalAlpha = 1;

  for (var c=0; c<TL.cards.length; c++){
    var card = TL.cards[c], r = card.rect;
    var cd = CLASSES[card.key];
    var hov = hit(r, mouseX, mouseY);
    ctx.fillStyle = hov ? '#1c2740' : '#111723';
    ctx.fillRect(r.x, r.y, r.w, r.h);
    ctx.strokeStyle = hov ? cd.color : '#2a3550';
    ctx.lineWidth = 2;
    ctx.strokeRect(r.x, r.y, r.w, r.h);
    ctx.fillStyle = cd.color;
    ctx.font = 'bold 24px Menlo, Consolas, monospace';
    ctx.textAlign = 'center';
    ctx.fillText('@', r.x+r.w/2, r.y+30);
    ctx.font = 'bold 15px Menlo, Consolas, monospace';
    ctx.fillText(cd.name, r.x+r.w/2, r.y+56);
    ctx.font = '11px Menlo, Consolas, monospace';
    ctx.fillStyle = '#9fb0c3';
    for (var l=0; l<cd.lines.length; l++)
      ctx.fillText(cd.lines[l], r.x+r.w/2, r.y+82+l*16);
    ctx.fillStyle = '#66788f';
    ctx.fillText('HP '+ (cd.hp + (hasPerk('vital')?5:0)) +'  Atk '+cd.atkBase, r.x+r.w/2, r.y+r.h-14);
  }

  var sb = TL.shrine;
  var shov = hit(sb, mouseX, mouseY);
  ctx.fillStyle = shov ? '#26314a' : '#161d2b';
  ctx.fillRect(sb.x, sb.y, sb.w, sb.h);
  ctx.strokeStyle = '#c9a0ff'; ctx.lineWidth = 1;
  ctx.strokeRect(sb.x+0.5, sb.y+0.5, sb.w, sb.h);
  ctx.fillStyle = '#c9a0ff';
  ctx.font = 'bold 12px Menlo, Consolas, monospace';
  ctx.fillText('☗ Soul Shrine', sb.x+sb.w/2, sb.y+sb.h/2+1);

  ctx.fillStyle = '#5a6578';
  ctx.font = '12px Menlo, Consolas, monospace';
  var best = loadBest(), wins = loadWins();
  ctx.fillText('Souls: '+loadSouls()+'    Best depth: '+best+(wins?('    Wins: '+wins):''), W/2, Math.min(H-14, p.y+p.h+20));

  if (titleShrine) drawShrine();
}
function drawShrine(){
  ctx.fillStyle = 'rgba(5,7,10,0.7)';
  ctx.fillRect(0,0,W,H);
  var L = shrineLayout(), p = L.panel;
  drawPanelFrame(p, 'Soul Shrine');
  drawClose(L.close);
  ctx.font = '12px Menlo, Consolas, monospace';
  ctx.textAlign='left'; ctx.textBaseline='middle';
  ctx.fillStyle = '#c9a0ff';
  ctx.fillText('Souls: '+loadSouls()+'  — permanent upgrades', p.x+14, p.y+50);
  var perks = loadPerks();
  for (var i=0; i<L.rows.length; i++){
    var rr = L.rows[i].rect;
    var perk = PERKS[i];
    var owned = !!perks[perk.key];
    var afford = loadSouls() >= perk.cost;
    var hov = hit(rr, mouseX, mouseY);
    drawRow(rr, hov && !owned && afford, '#c9a0ff');
    ctx.font = 'bold 12px Menlo, Consolas, monospace';
    ctx.textAlign='left';
    ctx.fillStyle = owned ? '#7ee787' : (afford ? '#dbe4ee' : '#5a6578');
    ctx.fillText(perk.name, rr.x+10, rr.y+11);
    ctx.font = '10px Menlo, Consolas, monospace';
    ctx.fillStyle = '#7d8ea3';
    ctx.fillText(perk.desc, rr.x+10, rr.y+25);
    ctx.font = 'bold 12px Menlo, Consolas, monospace';
    ctx.textAlign='right';
    ctx.fillStyle = owned ? '#7ee787' : (afford ? '#c9a0ff' : '#8a5a5a');
    ctx.fillText(owned ? 'OWNED' : perk.cost+' ☗', rr.x+rr.w-10, rr.y+rr.h/2+1);
  }
}
function drawEnd(){
  var won = screen === 'win';
  ctx.fillStyle = won ? 'rgba(20,16,4,0.78)' : 'rgba(5,7,10,0.72)';
  ctx.fillRect(0,0,W,H);
  var L = endLayout(), p = L.panel;
  ctx.fillStyle = 'rgba(8,11,17,0.96)';
  ctx.fillRect(p.x, p.y, p.w, p.h);
  ctx.strokeStyle = won ? '#ffd75f' : '#3a4664'; ctx.lineWidth = 2;
  ctx.strokeRect(p.x, p.y, p.w, p.h);

  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  if (won){
    ctx.fillStyle = '#ffd75f';
    ctx.font = 'bold 32px Menlo, Consolas, monospace';
    ctx.fillText('YOU ASCEND!', W/2, p.y+46);
    ctx.fillStyle = '#c9a0ff';
    ctx.font = '13px Menlo, Consolas, monospace';
    ctx.fillText('The Amulet of Yendor is yours.', W/2, p.y+82);
  } else {
    ctx.fillStyle = '#ff5c5c';
    ctx.font = 'bold 34px Menlo, Consolas, monospace';
    ctx.fillText('YOU DIED', W/2, p.y+46);
    ctx.fillStyle = '#9fb0c3';
    ctx.font = '13px Menlo, Consolas, monospace';
    ctx.fillText(S.causeOfDeath || 'The Depths claim another.', W/2, p.y+82);
  }
  ctx.fillStyle = '#c9d4e0';
  ctx.font = '14px Menlo, Consolas, monospace';
  ctx.fillText(CLASSES[S.cls].name+' — level '+S.level, W/2, p.y+116);
  ctx.fillText('Depth: '+S.depth+'    Kills: '+S.kills+'    Gold: '+S.gold+'    Turns: '+S.turn, W/2, p.y+140);

  ctx.fillStyle = '#c9a0ff';
  ctx.font = 'bold 13px Menlo, Consolas, monospace';
  ctx.fillText('+'+S.soulsEarned+' souls banked  (total '+loadSouls()+')', W/2, p.y+172);

  var best = loadBest(), wins = loadWins();
  ctx.font = '12px Menlo, Consolas, monospace';
  if (won){
    ctx.fillStyle = '#ffd75f';
    ctx.fillText('Victories: '+wins, W/2, p.y+200);
  } else {
    ctx.fillStyle = (best === S.depth && best > 0) ? '#e8d9a0' : '#5a6578';
    ctx.fillText((best === S.depth && best > 0 ? 'New best depth!' : 'Best depth: '+best)+(wins?('    Wins: '+wins):''), W/2, p.y+200);
  }

  var b = L.newRun;
  ctx.fillStyle = '#1a2233';
  ctx.fillRect(b.x, b.y, b.w, b.h);
  ctx.strokeStyle = '#e8d9a0'; ctx.lineWidth = 2;
  ctx.strokeRect(b.x, b.y, b.w, b.h);
  ctx.fillStyle = '#e8d9a0';
  ctx.font = 'bold 15px Menlo, Consolas, monospace';
  ctx.fillText('New Run', b.x+b.w/2, b.y+b.h/2+1);
}

// ---------- Debug handle (read-only; used for automated testing) ----------
window.__D = {
  get S(){ return S; },
  get screen(){ return screen; },
  get uiMode(){ return ui.mode; },
  get targetKind(){ return ui.targetKind; },
  get titleShrine(){ return titleShrine; },
  get tile(){ return tile; },
  get offX(){ return offX; },
  get offY(){ return offY; },
  get walking(){ return walkQueue.length > 0 || !!walkAttack; },
  get hud(){ return hudLayout(); },
  get invL(){ return invLayout(); },
  get shopL(){ return S && S.shopWares ? shopLayout() : null; },
  get levelL(){ return levelLayout(); },
  get endL(){ return endLayout(); },
  get titleL(){ return titleLayout(); },
  get shrineL(){ return shrineLayout(); },
  get minimap(){ return minimapOn; },
  get souls(){ return loadSouls(); },
  get perks(){ return loadPerks(); },
  step: function(){ if (screen === 'game') walkTick(performance.now()); }
};

// ---------- Main loop ----------
function frame(now){
  layoutFresh();
  ctx.fillStyle = '#05070a';
  ctx.fillRect(0,0,W,H);

  if (screen === 'title'){
    drawTitle(now);
  } else {
    if (screen === 'game') walkTick(now);
    var shaking = now - shakeT0 < 240;
    if (shaking){
      var k = (1 - (now-shakeT0)/240) * shakeMag;
      ctx.save();
      ctx.translate((Math.random()-0.5)*k, (Math.random()-0.5)*k);
    }
    drawMap();
    drawItems(now);
    drawKeeper();
    drawMonsters(now);
    drawPlayer(now);
    drawHover();
    drawEffects(now);
    if (shaking) ctx.restore();
    drawBossBar();
    drawMinimap();
    if (ui.mode === 'inventory') drawInventory();
    if (ui.mode === 'shop') drawShop();
    if (ui.mode === 'levelup') drawLevelUp();
    drawHUD();
    if (screen === 'dead' || screen === 'win') drawEnd();
  }
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

})();
</script>
</body>
</html>
